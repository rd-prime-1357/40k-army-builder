  function infoBtn(kind, id) {
    const glyph = kind === 'list'
      ? '\u2630'
      : '<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>';
    const title = kind === 'list' ? 'Show details for every item in this group' : 'Show details';
    return `<button type="button" class="info-btn${kind === 'list' ? ' info-list' : ''}" title="${title}" onclick="event.stopPropagation();toggleDetail('${id}')">${glyph}</button>`;
  }
  // Returns { btn, panel }: place btn inside the row/heading, panel immediately
  // after it. kind is 'eye' (single item) or 'list' (whole group).
  function mkDetail(kind, html) {
    const id = 'det' + (++_detSeq);
    return { btn: infoBtn(kind, id), panel: `<div class="lo-detail" id="${id}">${html}</div>` };
  }
  // Every recorded profile of a weapon whose base name matches (strike/sweep etc.).
  function weaponProfilesFor(raw, name) {
    const b = weaponBase(name);
    return ((raw && raw.weapons) || []).filter(w => weaponBase(w.weapon_name) === b);
  }
  function miniWeaponTable(profs) {
    let h = `<table class="weapon-table detail-wtable"><thead><tr><th>Weapon</th><th>Range</th><th>A</th><th>BS/WS</th><th>S</th><th>AP</th><th>D</th><th>Abilities</th></tr></thead><tbody>`;
    for (const w of profs) {
      const bsws = w.BS || w.WS || '\u2014';
      const ab = (w.weapon_ability_names && w.weapon_ability_names.length) ? w.weapon_ability_names.join(', ') : '\u2014';
      h += `<tr><td class="weapon-name-cell">${w.weapon_name}</td><td>${w.range}</td><td>${w.A}</td><td>${bsws}</td><td>${w.S}</td><td>${w.AP}</td><td>${w.D}</td><td class="weapon-abilities-cell">${ab}</td></tr>`;
    }
    return h + `</tbody></table>`;
  }
  // Detail for one selectable item. A label may be compound ('Heavy flamer +
  // Dreadnought combat weapon'), so each part is resolved on its own: a weapon
  // profile if the datasheet has one, else the item's rules text, else a note.
  function itemDetailHtml(raw, name) {
    let out = '';
    for (const part of String(name || '').split(' + ')) {
      const p = part.trim();
      if (!p) continue;
      const profs = weaponProfilesFor(raw, p);
      if (profs.length) { out += miniWeaponTable(profs); continue; }
      const desc = wargearAbilityDesc(raw, p);
      out += `<div class="lo-detail-name">${p}</div>`;
      out += desc ? `<div class="lo-detail-text">${desc}</div>`
                  : `<div class="lo-detail-text muted">No weapon profile or rules text is recorded for this item on this datasheet.</div>`;
    }
    return out || `<div class="lo-detail-text muted">No details available.</div>`;
  }
  // Detail for a whole group: every distinct item stacked, deduped by base name.
  function groupDetailHtml(raw, names) {
    const seen = new Set();
    let out = '';
    for (const n of (names || [])) {
      if (!n) continue;
      const k = weaponBase(n);
      if (seen.has(k)) continue;
      seen.add(k);
      out += `<div class="lo-detail-block">${itemDetailHtml(raw, n)}</div>`;
    }
    return out || `<div class="lo-detail-text muted">No details available.</div>`;
  }
  // Detail for a bundle endpoint: the weapons it adds, the rules text of anything
  // it grants, and a note of what it removes.
  function endpointDetailHtml(raw, ep) {
    let out = '';
    for (const w of (ep.adds || [])) out += `<div class="lo-detail-block">${itemDetailHtml(raw, w)}</div>`;
    for (const g of (ep.grants || [])) {
      const t = wargearAbilityDesc(raw, g.ability_name || g.option_name) || g.carrier_notes || '';
      out += `<div class="lo-detail-name">${g.option_name}</div>`;
      if (t) out += `<div class="lo-detail-text">${t}</div>`;
    }
    if (ep.removes && ep.removes.length) out += `<div class="lo-detail-text muted">Removes: ${ep.removes.join(', ')}</div>`;
    return out || `<div class="lo-detail-text muted">Default loadout — no changes.</div>`;
  }

  // B49: dedicated Leader section, placed first among ability sections. Reads
  // leader_eligible_units (resolved unit names) and leader_footer (raw Wahapedia
  // markup, injected as HTML — not escaped) off each model group that carries the
  // Leader ability. Multi-group units (e.g. Chaplain Grimaldus) get a label per
  // group; the common single-group case does not.
  function leaderSectionHtml(raw, sidPrefix) {
    const entries = [];
    for (const mg of raw.model_groups) {
      if (!mg.leader_ability_name) continue;
      const elig = mg.leader_eligible_units || [];
      if (!elig.length) continue;
      entries.push({ group: mg.model_group, eligible: elig, footer: mg.leader_footer || '' });
    }
    if (!entries.length) return '';
    const showGroupLabel = entries.length > 1;
    let body = '';
    for (const e of entries) {
      const word = e.eligible.length === 1 ? 'unit' : 'units';
      const label = showGroupLabel ? `<div class="stat-group-label">${e.group}</div>` : '';
      body += `${label}<div class="ability-row"><div class="ability-desc">This model can be attached to the following ${word}: ${e.eligible.join(', ')}.${e.footer ? ' ' + e.footer : ''}</div></div>`;
    }
    const sid = sidPrefix + '-leader';
    return `<div class="modal-section">
      <div class="modal-section-header" onclick="toggleSection('${sid}')">
        <span class="modal-section-heading"><span>Leader</span></span><span class="modal-section-chevron">▶</span>
      </div>
      <div class="modal-section-content" id="${sid}">${body}</div>
    </div>`;
  }

  function buildModalFull(raw) {
    let html = '';

    // Stat blocks — one per model group
    for (let i = 0; i < raw.model_groups.length; i++) {
      const mg = raw.model_groups[i];
      if (i > 0) html += '<hr class="model-group-divider">';

      if (raw.model_groups.length > 1) {
        html += `<div class="stat-block"><div class="stat-group-label">${mg.model_group}</div>`;
      } else {
        html += `<div class="stat-block">`;
      }

      const cs = conferredStats(raw, mg, null);
      html += buildStatTable(mg, cs.ov, cs.flags);
      html += `</div>`;

      // Weapons for this model group
      const mgWeapons = raw.weapons.filter(w => w.model_group === mg.model_group);
      html += buildWeaponSections(mgWeapons, 'full', null, raw);
    }

    // Leader — B49, placed first among ability sections (not merged into Abilities)
    html += leaderSectionHtml(raw, 'full');

    // Abilities — collected across all model groups (deduplicated)
    const allAbilityNames = [];
    for (const mg of raw.model_groups) {
      for (const name of mg.unit_ability_names) {
        if (!allAbilityNames.includes(name)) allAbilityNames.push(name);
      }
    }
    if (allAbilityNames.length > 0) {
      const sid = 'full-abilities';
      html += `<div class="modal-section">
        <div class="modal-section-header" onclick="toggleSection('${sid}')">
          <span class="modal-section-heading"><span>Abilities</span><span class="modal-section-names">${allAbilityNames.join(', ')}</span></span><span class="modal-section-chevron">▶</span>
        </div>
        <div class="modal-section-content" id="${sid}">`;
      for (const name of allAbilityNames) {
        const desc = (raw.unit_ability_details && raw.unit_ability_details[name]) || abilitiesLookup[name] || '';
        html += `<div class="ability-row">
          <div class="ability-name">${name}</div>
          ${desc ? `<div class="ability-desc">${desc}</div>` : ''}
        </div>`;
      }
      html += `</div></div>`;
    }

    // Rules — collected across all model groups (deduplicated)
    const allRuleNames = [];
    for (const mg of raw.model_groups) {
      for (const name of mg.rule_names) {
        if (name !== 'Leader' && !allRuleNames.includes(name)) allRuleNames.push(name);
      }
    }
    if (allRuleNames.length > 0) {
      const sid = 'full-rules';
      html += `<div class="modal-section">
        <div class="modal-section-header" onclick="toggleSection('${sid}')">
          <span class="modal-section-heading"><span>Rules</span><span class="modal-section-names">${allRuleNames.join(', ')}</span></span><span class="modal-section-chevron">▶</span>
        </div>
        <div class="modal-section-content" id="${sid}">`;
      for (const name of allRuleNames) {
        const desc = glossaryDesc(name);
        html += `<div class="ability-row">
          <div class="ability-name">${name}</div>
          ${desc ? `<div class="ability-desc">${desc}</div>` : ''}
        </div>`;
      }
      html += `</div></div>`;
    }

    // Wargear Abilities — the BROWSE popup is the datasheet, so it lists every
    // wargear ability the unit can have: default-issue gear and option-granted gear
    // alike (B46). Filtering to what a given build actually carries is the
    // configured popup's job.
    const allWargearAbilities = allWargearAbilityNames(raw);
    if (allWargearAbilities.length > 0) {
      const sid = 'full-wargear-abilities';
      html += `<div class="modal-section">
        <div class="modal-section-header" onclick="toggleSection('${sid}')">
          <span class="modal-section-heading"><span>Wargear Abilities</span><span class="modal-section-names">${allWargearAbilities.join(', ')}</span></span><span class="modal-section-chevron">▶</span>
        </div>
        <div class="modal-section-content" id="${sid}">`;
      for (const name of allWargearAbilities) {
        const desc = wargearAbilityDesc(raw, name);
        html += `<div class="ability-row">
          <div class="ability-name">${name}</div>
          ${desc ? `<div class="ability-desc">${desc}</div>` : ''}
        </div>`;
      }
      html += `</div></div>`;
    }

    // Keywords — always visible, no collapse
    const allKeywordNames = [];
    for (const mg of raw.model_groups) {
      for (const name of mg.keyword_names) {
        if (!allKeywordNames.includes(name)) allKeywordNames.push(name);
      }
    }
    // Faction keywords (rendered "Faction: X") and model-specific keywords
    // (rendered "MODEL: kw") mirror the datasheet's separate lines.
    const allFactionKw = [];
    const modelKwLines = [];
    for (const mg of raw.model_groups) {
      for (const name of (mg.faction_keyword_names || [])) {
        if (!allFactionKw.includes(name)) allFactionKw.push(name);
      }
      for (const mk of (mg.model_keyword_names || [])) {
        const line = `${mk.model}: ${mk.keywords.join(', ')}`;
        if (!modelKwLines.includes(line)) modelKwLines.push(line);
      }
    }
    if (allKeywordNames.length > 0 || allFactionKw.length > 0 || modelKwLines.length > 0) {
      html += `<div class="modal-section"><div class="modal-section-label">Keywords</div>`;
      html += `<div class="keyword-list">`;
      for (const name of allKeywordNames) {
        html += `<span class="keyword-pill">${name}</span>`;
      }
      html += `</div>`;
      for (const line of modelKwLines) {
        html += `<div class="keyword-model-line">${line}</div>`;
      }
      if (allFactionKw.length > 0) {
        html += `<div class="keyword-faction-line">Faction: ${allFactionKw.join(', ')}</div>`;
      }
      html += `</div>`;
    }

    return html;
  }

  // ── Modal: Configured view ─────────────────────────────────────────────────

  function buildModalConfigured(raw, entry, auraFlags) {
    let html = '';

    // Determine which weapons are "active" based on wargear state
    const hasWargear = (raw.wargear_options && raw.wargear_options.length > 0) ||
                       (raw.bundled_swaps && raw.bundled_swaps.length > 0);

    // Build sets of active / replaced weapon FAMILIES (base names). Matching on
    // the family means selecting one profile of a weapon activates all of its
    // profiles and removes all profiles of the weapon it replaced.
    const activeBases = new Set();
    const replacedBases = new Set();
    // Union of every weapon family any bundle line can add. A bundle-managed
    // family that isn't currently active is hidden from the configured loadout.
    const bundleAddBases = new Set();

    if (hasWargear) {
      // Process group choices (radio-style)
      const groups = {};
      const independent = [];
      for (const opt of raw.wargear_options) {
        if (opt.is_choice && opt.option_group) {
          if (!groups[opt.option_group]) groups[opt.option_group] = [];
          groups[opt.option_group].push(opt);
        } else {
          independent.push(opt);
        }
      }

      for (const [groupKey, opts] of Object.entries(groups)) {
        const stateKey = `group_${groupKey}`;
        const chosen = entry.wargear[stateKey] || null;
        if (chosen) {
          activeBases.add(weaponBase(chosen));
          // Mark the replaced family
          const replacedOpt = opts[0];
          if (replacedOpt) replacedBases.add(weaponBase(replacedOpt.weapon_replaced));
        }
      }

      for (const opt of independent) {
        const stateKey = `indep_${weaponBase(opt.weapon_replaced)}`;
        if (entry.wargear[stateKey]) {
          activeBases.add(weaponBase(opt.replacement_weapon_name));
          replacedBases.add(weaponBase(opt.weapon_replaced));
        }
      }

      // Bundled / compound swaps. Each group resolves to exactly one chosen
      // endpoint (its default when state is unset). The chosen endpoint's adds
      // become active and its removes become replaced; every add the group
      // COULD make is recorded so unchosen ones drop out of the loadout.
      if (raw.bundled_swaps) {
        raw.bundled_swaps.forEach((bundle, gi) => {
          const ep = bundleChosenEndpoint(entry, bundle, gi);
          for (const b of (bundle.endpoints || []).flatMap(e => e.adds || [])) bundleAddBases.add(weaponBase(b));
          if (ep) {
            for (const b of (ep.adds    || [])) activeBases.add(weaponBase(b));
            for (const b of (ep.removes || [])) replacedBases.add(weaponBase(b));
          }
        });
      }
    }

    // D105: names that confer nothing in this build (no model carries the item).
    const inertWA = new Set();
    for (let i = 0; i < raw.model_groups.length; i++) {
      const mg = raw.model_groups[i];
      if (i > 0) html += '<hr class="model-group-divider">';

      if (raw.model_groups.length > 1) {
        html += `<div class="stat-block"><div class="stat-group-label">${mg.model_group}</div>`;
      } else {
        html += `<div class="stat-block">`;
      }

      // Stat overrides from equipped wargear/grants, all read from ability text:
      // active weapon/wargear abilities (e.g. Shining aegis -> Sv 3+) plus active
      // bundle grants (e.g. relic shield -> W, storm shield -> INV).
      const cs = conferredStats(raw, mg, entry);
      const overrides = Object.assign(
        {},
        cs.ov,
        activeWeaponStatOverrides(raw, mg, activeBases, replacedBases),
        activeStatOverrides(entry, raw),
        activeOtherOptionOverrides(entry, raw)
      );

      // B7b: aura flags apply only to the first model group (Character panel).
      const auraForThisMg = (i === 0 && auraFlags && auraFlags.length) ? auraFlags : null;
      html += buildStatTable(mg, overrides, cs.flags, auraForThisMg);
      cs.inert.forEach(n => inertWA.add(n));
      html += `</div>`;

      // Weapons for this model group — configured view (skipped for loadout units,
      // which render rollup-based weapon counts once, below).
      if (!loadoutFor(entry)) {
        const mgWeapons = raw.weapons.filter(w => w.model_group === mg.model_group);
        html += buildWeaponSections(mgWeapons, 'configured', { activeBases, replacedBases, bundleAddBases, hasWargear }, raw, entry);
      }
    }
    const cfgLoDef = loadoutFor(entry);
    if (cfgLoDef) html += loadoutWeaponHtml(entry, cfgLoDef, raw);

    // Leader — B49, placed first among ability sections (not merged into Abilities)
    html += leaderSectionHtml(raw, 'cfg');

    // Abilities
    const allAbilityNames = [];
    for (const mg of raw.model_groups) {
      for (const name of mg.unit_ability_names) {
        if (!allAbilityNames.includes(name)) allAbilityNames.push(name);
      }
    }
    if (allAbilityNames.length > 0) {
      const sid = 'cfg-abilities';
      html += `<div class="modal-section">
        <div class="modal-section-header" onclick="toggleSection('${sid}')">
          <span class="modal-section-heading"><span>Abilities</span><span class="modal-section-names">${allAbilityNames.join(', ')}</span></span><span class="modal-section-chevron">▶</span>
        </div>
        <div class="modal-section-content" id="${sid}">`;
      for (const name of allAbilityNames) {
        const desc = (raw.unit_ability_details && raw.unit_ability_details[name]) || abilitiesLookup[name] || '';
        html += `<div class="ability-row">
          <div class="ability-name">${name}</div>
          ${desc ? `<div class="ability-desc">${desc}</div>` : ''}
        </div>`;
      }
      html += `</div></div>`;
    }

    // Rules
    const allRuleNames = [];
    for (const mg of raw.model_groups) {
      for (const name of mg.rule_names) {
        if (name !== 'Leader' && !allRuleNames.includes(name)) allRuleNames.push(name);
      }
    }
    // Roll-up: append the abilities of the unit's ACTIVE weapons (still shown
    // per-weapon too). Loadout units use the rollup's equipped set; others use
    // the old skip predicate so replaced weapons drop out.
    const rollDef = loadoutFor(entry);
    if (rollDef) {
      const rr = loRollup(rollDef, loadoutSize(entry, rollDef), loadoutSelections(entry, rollDef), loOptCounts(rollDef, entry));
      const active = {};
      for (const kv of rr.weapons.entries()) active[kv[0].toLowerCase()] = kv[1];
      for (const w of raw.weapons) {
        if (!(active[weaponBase(w.weapon_name)] > 0)) continue;
        for (const ab of (w.weapon_ability_names || [])) if (!allRuleNames.includes(ab)) allRuleNames.push(ab);
      }
    } else {
      const wgStateRollup = { activeBases, replacedBases, bundleAddBases, hasWargear };
      for (const w of raw.weapons) {
        if (shouldSkipWeapon(w, 'configured', wgStateRollup, raw, entry)) continue;
        for (const ab of (w.weapon_ability_names || [])) if (!allRuleNames.includes(ab)) allRuleNames.push(ab);
      }
    }
    if (allRuleNames.length > 0) {
      const sid = 'cfg-rules';
      html += `<div class="modal-section">
        <div class="modal-section-header" onclick="toggleSection('${sid}')">
          <span class="modal-section-heading"><span>Rules</span><span class="modal-section-names">${allRuleNames.join(', ')}</span></span><span class="modal-section-chevron">▶</span>
        </div>
        <div class="modal-section-content" id="${sid}">`;
      for (const name of allRuleNames) {
        const desc = glossaryDesc(name);
        html += `<div class="ability-row">
          <div class="ability-name">${name}</div>
          ${desc ? `<div class="ability-desc">${desc}</div>` : ''}
        </div>`;
      }
      html += `</div></div>`;
    }

    // Wargear Abilities — the CONFIGURED popup lists what THIS build carries, from
    // the full ability set (default-issue and option-granted alike, B46), filtered by
    // carrier count on the same three-way rule the statline uses (D112): every model
    // carries it -> plain row; some carry it -> asterisked row; none -> not rendered.
    const cfgWA = [];
    for (const name of allWargearAbilityNames(raw)) {
      const mode = wargearAbilityMode(raw, entry, name);
      if (mode === 'none') continue;                      // no model in this build has it
      if (inertWA.has(name)) continue;                    // D105 statline pass agrees
      cfgWA.push({ name: name, partial: mode === 'some' });
    }
    if (cfgWA.length > 0) {
      const sid = 'cfg-wargear-abilities';
      const heading = cfgWA.map(x => x.name + (x.partial ? '*' : '')).join(', ');
      html += `<div class="modal-section">
        <div class="modal-section-header" onclick="toggleSection('${sid}')">
          <span class="modal-section-heading"><span>Wargear Abilities</span><span class="modal-section-names">${heading}</span></span><span class="modal-section-chevron">▶</span>
        </div>
        <div class="modal-section-content" id="${sid}">`;
      for (const wa of cfgWA) {
        const desc = wargearAbilityDesc(raw, wa.name);
        html += `<div class="ability-row">
          <div class="ability-name">${wa.name}${wa.partial ? '<sup class="stat-asterisk">*</sup>' : ''}</div>
          ${desc ? `<div class="ability-desc">${desc}</div>` : ''}
          ${wa.partial ? `<div class="ability-partial">* only some models in this unit carry this</div>` : ''}
        </div>`;
      }
      html += `</div></div>`;
    }

    // Keywords — always visible
    const allKeywordNames = [];
    const cfgFactionKw = [];
    const cfgModelKwLines = [];
    for (const mg of raw.model_groups) {
      for (const name of mg.keyword_names) {
        if (!allKeywordNames.includes(name)) allKeywordNames.push(name);
      }
      for (const name of (mg.faction_keyword_names || [])) {
        if (!cfgFactionKw.includes(name)) cfgFactionKw.push(name);
      }
      for (const mk of (mg.model_keyword_names || [])) {
        const line = `${mk.model}: ${mk.keywords.join(', ')}`;
        if (!cfgModelKwLines.includes(line)) cfgModelKwLines.push(line);
      }
    }
    if (allKeywordNames.length > 0 || cfgFactionKw.length > 0 || cfgModelKwLines.length > 0) {
      html += `<div class="modal-section"><div class="modal-section-label">Keywords</div>`;
      html += `<div class="keyword-list">`;
      for (const name of allKeywordNames) {
        html += `<span class="keyword-pill">${name}</span>`;
      }
      html += `</div>`;
      for (const line of cfgModelKwLines) {
        html += `<div class="keyword-model-line">${line}</div>`;
      }
      if (cfgFactionKw.length > 0) {
        html += `<div class="keyword-faction-line">Faction: ${cfgFactionKw.join(', ')}</div>`;
      }
      html += `</div>`;
    }

    return html;
  }

  // ── Shared modal helpers ───────────────────────────────────────────────────

  function buildStatTable(mg, overrides, flags, auraFlags) {
    const ov  = overrides || {};
    const fl  = flags || {};
    // B7b: aura flags come from attached-leader `bodyguard_stat_flags` unioned
    // at combined-popup time. The set may include INV, FNP, LD, T, M, OC (D157
    // markable-stat list) and rarely W or SV. Aura stars use the same * symbol
    // as wargear stars; the legend text below distinguishes the source.
    const aura = {};
    for (const k of (auraFlags || [])) aura[k] = true;
    // SV and LD carry a trailing '+' in the data while INV/FNP are bare numbers;
    // strip any existing '+' so we don't render a doubled '++'.
    const cleanPlus = v => String(v == null ? '' : v).replace(/\+\s*$/, '');
    const ovCell = (key, base, suffix='') => {
      const has = ov[key] !== undefined && ov[key] !== null;
      const val = has ? ov[key] : base;
      return has ? `<span class="stat-override">${val}${suffix}</span>` : `${val}${suffix}`;
    };
    // INV/FNP: an override (e.g. storm shield -> 4+ invuln) replaces the cell and
    // its condition text; otherwise show the base value or an em dash.
    const invOv = ov.INV !== undefined && ov.INV !== null;
    const fnpOv = ov.FNP !== undefined && ov.FNP !== null;
    // E17: a per-model bearer value that can't be shown as a whole-group number is
    // marked with an asterisk (only when the cell isn't already carrying a real
    // override value). The asterisk points at the Wargear Abilities section.
    // B7b: an aura on the same cell fires the same asterisk (source disambiguated
    // in the legend text).
    const invStar = (!invOv && (fl.INV || aura.INV)) ? '<sup class="stat-asterisk">*</sup>' : '';
    const fnpStar = (!fnpOv && (fl.FNP || aura.FNP)) ? '<sup class="stat-asterisk">*</sup>' : '';
    // B15: W and SV take the same asterisk when some — but not all — models carry
    // the item that would set them.
    const wOv     = ov.W  !== undefined && ov.W  !== null;
    const svOv    = ov.SV !== undefined && ov.SV !== null;
    const wStar   = (!wOv  && (fl.W  || aura.W))  ? '<sup class="stat-asterisk">*</sup>' : '';
    const svStar  = (!svOv && (fl.SV || aura.SV)) ? '<sup class="stat-asterisk">*</sup>' : '';
    // B7b: LD, T, M, OC gain aura-only asterisk support (no wargear-flag or
    // override machinery today; conferralStats has never targeted these cells).
    const ldStar  = aura.LD ? '<sup class="stat-asterisk">*</sup>' : '';
    const tStar   = aura.T  ? '<sup class="stat-asterisk">*</sup>' : '';
    const mStar   = aura.M  ? '<sup class="stat-asterisk">*</sup>' : '';
    const ocStar  = aura.OC ? '<sup class="stat-asterisk">*</sup>' : '';
    const inv = invOv ? `<span class="stat-override">${cleanPlus(ov.INV)}+</span>` : (mg.INV ? `${mg.INV}+` : '\u2014');
    const fnp = fnpOv ? `<span class="stat-override">${cleanPlus(ov.FNP)}+</span>` : (mg.FNP ? `${mg.FNP}+` : '\u2014');
    const invCond = (!invOv && mg.INV_Condition) ? ` <span style="font-size:0.6rem;color:#666;">(${mg.INV_Condition})</span>` : '';
    const fnpCond = (!fnpOv && mg.FNP_Condition) ? ` <span style="font-size:0.6rem;color:#666;">(${mg.FNP_Condition})</span>` : '';
    const svDisplay = ovCell('SV', cleanPlus(mg.SV), '+');
    const wDisplay  = ovCell('W',  mg.W);
    // Legend adapts to the source: an aura anywhere means the reader needs the
    // Abilities section (a broader label that covers both wargear-abilities and
    // unit-abilities sources); pure-wargear stars keep the old label.
    const hasWargearStar = invStar || fnpStar || wStar || svStar
                           ? ((!aura.INV && fl.INV) || (!aura.FNP && fl.FNP)
                              || (!aura.W && fl.W) || (!aura.SV && fl.SV))
                           : false;
    const hasAuraStar    = invStar || fnpStar || wStar || svStar || ldStar || tStar || mStar || ocStar
                           ? (aura.INV || aura.FNP || aura.LD || aura.T || aura.M || aura.OC
                              || aura.W || aura.SV)
                           : false;
    let legendText = '';
    if (hasAuraStar) legendText = '* see Abilities';
    else if (hasWargearStar) legendText = '* see Wargear Abilities';
    const legend = legendText
      ? `<div class="stat-asterisk-legend">${legendText}</div>` : '';

    return `<table class="stat-table">
      <thead>
        <tr>
          <th>M</th><th>T</th><th>SV</th><th>INV</th><th>FNP</th><th>W</th><th>LD</th><th>OC</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>${mg.M}${mStar}</td>
          <td>${mg.T}${tStar}</td>
          <td>${svDisplay}${svStar}</td>
          <td class="inv-cell">${inv}${invStar}${invCond}</td>
          <td class="fnp-cell">${fnp}${fnpStar}${fnpCond}</td>
          <td>${wDisplay}${wStar}</td>
          <td>${cleanPlus(mg.LD)}+${ldStar}</td>
          <td>${mg.OC}${ocStar}</td>
        </tr>
      </tbody>
    </table>${legend}`;
  }

  function buildWeaponSections(weapons, mode, wargearState, raw, entry) {
    // Separate by type
    const ranged = weapons.filter(w => w.weapon_type === 'Ranged');
    const melee  = weapons.filter(w => w.weapon_type === 'Melee');

    let html = '';

    if (ranged.length > 0) {
      html += buildWeaponTable('Ranged Weapons', ranged, mode, wargearState, raw, entry);
    }
    if (melee.length > 0) {
      html += buildWeaponTable('Melee Weapons', melee, mode, wargearState, raw, entry);
    }

    return html;
  }

  function buildWeaponTable(label, weapons, mode, wargearState, raw, entry) {
    let html = `<div class="weapon-section">
      <div class="weapon-section-label">${label}</div>
      <table class="weapon-table">
        <thead>
          <tr>
            <th>Weapon</th><th>Range</th><th>A</th><th>BS/WS</th><th>S</th><th>AP</th><th>D</th><th>Abilities</th>
          </tr>
        </thead>
        <tbody>`;

    for (const w of weapons) {
      const dimmed = shouldDimWeapon(w, mode, wargearState, raw, entry);
      const skip   = shouldSkipWeapon(w, mode, wargearState, raw, entry);
      if (skip) continue;

      const rowClass = dimmed ? ' class="weapon-dimmed"' : '';
      const bsws = w.BS || w.WS || '—';
      const abilities = w.weapon_ability_names && w.weapon_ability_names.length > 0
        ? w.weapon_ability_names.join(', ')
        : '—';

      html += `<tr${rowClass}>
        <td class="weapon-name-cell">${w.weapon_name}</td>
        <td>${w.range}</td>
        <td>${w.A}</td>
        <td>${bsws}</td>
        <td>${w.S}</td>
        <td>${w.AP}</td>
        <td>${w.D}</td>
        <td class="weapon-abilities-cell">${abilities}</td>
      </tr>`;
    }

    html += `</tbody></table></div>`;
    return html;
  }

  function shouldDimWeapon(w, mode, wargearState, raw, entry) {
    if (mode === 'configured') return false; // configured view never dims — it hides instead

    // Full view: dim non-default weapons
    // God-conditional weapons are dimmed (greyed) in full view
    if (w.allegiance_condition) return true;

    // Replacement options that aren't base equipment are dimmed
    if (!w.is_base_equipment) return true;

    // If this weapon is a replacement option (its family appears in
    // wargear_options as a replacement), it's non-default and should be dimmed
    const isReplacement = raw && raw.wargear_options &&
      raw.wargear_options.some(opt => weaponBase(opt.replacement_weapon_name) === weaponBase(w.weapon_name));
    if (isReplacement) return true;

    return false;
  }

  function shouldSkipWeapon(w, mode, wargearState, raw, entry) {
    if (mode === 'full') return false; // full view shows everything

    // Configured view: skip weapons that are not part of this unit's loadout
    const { activeBases, replacedBases, bundleAddBases, hasWargear } = wargearState;

    // No wargear options — show everything
    if (!hasWargear) return false;

    // God-conditional weapons: only show if god matches
    if (w.allegiance_condition) {
      return !entry || entry.god !== w.allegiance_condition;
    }

    const wb = weaponBase(w.weapon_name);

    // If this weapon's family was replaced, skip it (unless that same family is
    // the active replacement) — hides every profile of the replaced weapon.
    if (replacedBases.has(wb) && !activeBases.has(wb)) return true;

    // If this weapon's family is a replacement option that wasn't selected, skip
    // it — keeps unchosen replacement families (all profiles) out of the loadout.
    const isReplacement = raw && raw.wargear_options &&
      raw.wargear_options.some(opt => weaponBase(opt.replacement_weapon_name) === wb);
    if (isReplacement && !activeBases.has(wb)) return true;

    // Bundle-managed replacement family that wasn't chosen — skip all profiles.
    if (bundleAddBases && bundleAddBases.has(wb) && !activeBases.has(wb)) return true;

    return false;
  }

  // ── Collapsible modal sections ─────────────────────────────────────────────

  function toggleSection(id) {
    const content = document.getElementById(id);
    const header  = content && content.previousElementSibling;
    if (!content) return;
    const isOpen = content.classList.contains('open');
    content.classList.toggle('open', !isOpen);
    if (header) header.classList.toggle('open', !isOpen);
  }

  // ── List management (step 3) ───────────────────────────────────────────────

  function escHtml(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function escAttr(s){ return escHtml(s).replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }

  function findFactionByName(name) {
    for (const g of factionTaxonomy.groups) {
      const f = g.factions.find(f => f.name === name);
      if (f) return { group: g.group, faction: f };
    }
    return null;
  }

  function showHome() {
    commitPendingDelete(); // E8: don't lose an in-flight delete on navigation
    currentScreen = 'home';
    currentListId = null;
    currentListMeta = null;
    document.getElementById('screen-home').classList.remove('hidden');
    document.getElementById('screen-builder').classList.add('hidden');
    document.getElementById('builder-chrome').classList.add('hidden');
    document.getElementById('banner-army-pts-wrap').classList.add('hidden');
    document.getElementById('banner-points').classList.add('hidden');
    renderMyLists();
  }

  function showBuilder() {
    currentScreen = 'builder';
    document.getElementById('screen-home').classList.add('hidden');
    document.getElementById('screen-builder').classList.remove('hidden');
    document.getElementById('builder-chrome').classList.remove('hidden');
    document.getElementById('banner-army-pts-wrap').classList.remove('hidden');
    document.getElementById('banner-points').classList.remove('hidden');
  }

  var _myListsSort = 'recent';
  function setMyListsSort(v) {
    _myListsSort = (v === 'name' || v === 'faction') ? v : 'recent';
    renderMyLists();
  }
  function sortMyListRows(rows) {
    var by = _myListsSort;
    return rows.slice().sort(function (a, b) {
      if (by === 'name') {
        return String(a.name || '').localeCompare(String(b.name || ''), undefined, { sensitivity: 'base' });
      }
      if (by === 'faction') {
        var f = String(a.primary_faction || '').localeCompare(String(b.primary_faction || ''), undefined, { sensitivity: 'base' });
        if (f !== 0) return f;
        return String(a.name || '').localeCompare(String(b.name || ''), undefined, { sensitivity: 'base' });
      }
      // recent: newest modified first; missing dates sink
      return (b.modified || 0) - (a.modified || 0);
    });
  }

  function renderMyLists() {
    const c = document.getElementById('mylists-container');
    if (!store) { c.innerHTML = ''; return; }
    store.list().then(rows => {
      const backupBtn = document.getElementById('backup-all-btn');
      const sortSel   = document.getElementById('mylists-sort');
      if (backupBtn) backupBtn.classList.toggle('hidden', !rows.length);
      if (sortSel) { sortSel.classList.toggle('hidden', !rows.length); sortSel.value = _myListsSort; }
      if (!rows.length) {
        c.innerHTML = '<div class="home-empty">No saved lists yet. Click &ldquo;New List&rdquo; to start building.</div>';
        return;
      }
      rows = sortMyListRows(rows);
      c.innerHTML = '<div class="mylists">' + rows.map(r => {
        const when = r.modified ? new Date(r.modified).toLocaleDateString() : '';
        const tgt  = r.points_target ? ('target ' + r.points_target) : '';
        const n    = r.entry_count;
        return '<div class="mylist-row" onclick="openList(\'' + r.id + '\')">'
          + '<div class="mylist-main">'
          +   '<div class="mylist-name">' + escHtml(r.name) + '</div>'
          +   '<div class="mylist-meta"><span class="mylist-faction">' + escHtml(r.primary_faction || '—') + '</span> · '
          +     n + ' unit' + (n === 1 ? '' : 's') + (when ? ' · ' + when : '') + '</div>'
          + '</div>'
          + '<span class="mylist-pts">' + tgt + '</span>'
          + '<button class="mylist-exp" title="Export list" onclick="event.stopPropagation();exportListById(\'' + r.id + '\',\'' + escAttr(r.name) + '\')">&#8623;</button>'
          + '<button class="mylist-del" title="Delete list" onclick="event.stopPropagation();deleteList(\'' + r.id + '\',\'' + escAttr(r.name) + '\')">&times;</button>'
          + '</div>';
      }).join('') + '</div>';
    }).catch(e => { console.warn('list() failed', e); c.innerHTML = '<div class="home-empty">Could not read saved lists.</div>'; });
  }

  // ── Create ────────────────────────────────────────────────────────────────
  function openCreateModal() {
    document.getElementById('create-name').value = '';
    document.getElementById('create-err').textContent = '';
    document.getElementById('create-points').value = '2000';
    const gs = document.getElementById('create-group-select');
    if (gs.options.length) { gs.selectedIndex = 0; onCreateGroupChange(gs.value); }
    document.getElementById('create-modal').classList.remove('hidden');
    document.getElementById('create-name').focus();
  }
  function closeCreateModal() { document.getElementById('create-modal').classList.add('hidden'); }
  function closeCreateOnOverlay(e) { if (e.target.id === 'create-modal') closeCreateModal(); }

  function confirmCreateList() {
    const err  = document.getElementById('create-err');
    const name = document.getElementById('create-name').value.trim();
    if (!name) { err.textContent = 'Enter a list name.'; return; }
    const groupName   = document.getElementById('create-group-select').value;
    const factionName = document.getElementById('create-faction-select').value;
    const fac = factionRecord(groupName, factionName);
    if (!fac || !fac.built) { err.textContent = 'Pick a playable faction.'; return; }
    const target = Number(document.getElementById('create-points').value);

    commitPendingDelete(); // E8: don't lose an in-flight delete on navigation
    setFaction(fac);
    armyList = []; selectedListId = null; nextId = 1; hasGhosts = false;
    warlordEntryId = null;
    currentListId   = ListStorage.newListId();
    currentListMeta = { name: name, points_target: target, primary_faction: fac.name, created: Date.now() };
    POINTS_CAP = target;
    document.getElementById('banner-army-pts-select').value = String(target);

    closeCreateModal();
    showBuilder();
    renderAll();
    saveNow();   // persist the empty named list so it appears on the home page
  }

  // ── Open / load (id-first resolve, ghost rows for misses) ─────────────────
  function openList(id) {
    if (!store) return;
    commitPendingDelete(); // E8: don't lose an in-flight delete on navigation
    store.get(id).then(rec => {
      if (!rec) { alert('List not found.'); renderMyLists(); return; }
      const found = findFactionByName(rec.primary_faction);
      if (!found) { alert('The faction for this list (' + rec.primary_faction + ') is not available.'); return; }
      setFaction(found.faction);

      const resolvers = {
        resolveUnit: function (faction_ref, unit_id, unit_name) {
          let u = null;
          if (unit_id)   u = rawUnits.find(x => x.unit_id === unit_id);
          if (!u && unit_name) u = rawUnits.find(x => x.unit_name === unit_name);
          return u ? { unit_name: u.unit_name, unit_type: u.unit_type } : null;
        }
      };
      const out = ListStorage.deserialize(rec, resolvers);
      armyList  = out.armyList;
      nextId    = (out.maxEntryId || 0) + 1;
      warlordEntryId = out.warlordEntryId;

      // Recompute points for resolved entries (reference model — never frozen);
      // ghosts keep their saved cached points for display only.
      const cacheById = {};
      (rec.entries || []).forEach(e => { cacheById[e.entry_id] = e.points_cache; });
      armyList.forEach(e => {
        if (e.unresolved) e.points = (cacheById[e.listId] != null ? cacheById[e.listId] : null);
        else              e.points = ptsForEntry(e);
      });
      hasGhosts = armyList.some(e => e.unresolved);

      currentListId   = rec.id;
      currentListMeta = { name: rec.name, points_target: rec.points_target, primary_faction: rec.primary_faction, created: rec.created };
      POINTS_CAP = rec.points_target || 2000;
      document.getElementById('banner-army-pts-select').value = String(POINTS_CAP);
      selectedListId = null;

      showBuilder();
      renderAll();
    }).catch(e => { console.warn('open failed', e); alert('Could not open this list.'); });
  }

  function deleteList(id, name) {
    if (!confirm('Delete \u201c' + name + '\u201d? This cannot be undone.')) return;
    store.delete(id).then(() => renderMyLists()).catch(e => console.warn('delete failed', e));
  }

  // ── Export / Import (JSON portability) ────────────────────────────────────
  // Reuses the module's exportRecords/importRecords + migrate hook. The file
  // shape is the module envelope with an added app_version diagnostic stamp.
  // Import always mints a fresh id so it can never clobber a surviving list.
  function serialiseForExport(records) {
    var env = JSON.parse(ListStorage.exportRecords(records));
    env.app_version = VERSION;
    return JSON.stringify(env, null, 2);
  }
  function safeFileName(name) {
    var s = String(name || 'army-list').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
    return (s || 'army-list') + '.json';
  }
  function downloadText(filename, text) {
    var blob = new Blob([text], { type: 'application/json' });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 0);
  }
  function copyText(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(
        function () { flashBanner('Copied to clipboard'); },
        function () { fallbackCopy(text); }
      );
    } else { fallbackCopy(text); }
  }
  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); flashBanner('Copied to clipboard'); }
    catch (e) { alert('Could not copy automatically — the JSON is in the Export file instead.'); }
    document.body.removeChild(ta);
  }
  var _flashTimer = null;
  function flashBanner(msg) {
    var el = document.getElementById('banner-changed');
    if (!el) return;
    var prevHidden = el.classList.contains('hidden');
    var prevText   = el.textContent;
    el.textContent = msg; el.classList.remove('hidden');
    if (_flashTimer) clearTimeout(_flashTimer);
    _flashTimer = setTimeout(function () {
      el.textContent = prevText;
      if (prevHidden) el.classList.add('hidden');
    }, 1600);
  }

  // Live export of the open list — captures unsaved edits via buildRecord.
  function currentExportRecord() {
    return ListStorage.buildRecord(currentMeta(), armyList, saveLookups);
  }
  function exportCurrentList() {
    if (!currentListId) return;
    var rec = currentExportRecord();
    downloadText(safeFileName(rec.name), serialiseForExport([rec]));
  }
  function copyCurrentList() {
    if (!currentListId) return;
    copyText(serialiseForExport([currentExportRecord()]));
  }
  // Export a saved list from the home page (persisted record).
  function exportListById(id, name) {
    if (!store) return;
    store.get(id).then(function (rec) {
      if (!rec) { alert('List not found.'); return; }
      downloadText(safeFileName(rec.name || name), serialiseForExport([rec]));
    }).catch(function (e) { console.warn('export failed', e); alert('Could not export this list.'); });
  }
  // Back up every saved list into one envelope. store.get() runs migrate, so a
  // corrupt or newer-schema record surfaces its flag rather than a real record;
  // those are skipped and counted (surface, don't silently drop), the rest go
  // into a single re-importable file.
  var _homeFlashTimer = null;
  function homeFlash(msg) {
    var el = document.getElementById('home-flash');
    if (!el) return;
    el.textContent = msg; el.classList.remove('hidden');
    if (_homeFlashTimer) clearTimeout(_homeFlashTimer);
    _homeFlashTimer = setTimeout(function () {
      el.textContent = ''; el.classList.add('hidden');
    }, 2200);
  }
  function exportAllLists() {
    if (!store) return;
    store.list().then(function (rows) {
      if (!rows.length) { homeFlash('No lists to back up'); return; }
      return Promise.all(rows.map(function (r) {
        return store.get(r.id).catch(function () { return null; });
      })).then(function (recs) {
        var valid = recs.filter(function (rec) {
          return rec && rec.id && !rec.__corrupt && !rec.__incompatible;
        });
        var skipped = rows.length - valid.length;
        if (!valid.length) { homeFlash('No backable lists found'); return; }
        var stamp = new Date().toISOString().slice(0, 10);
        downloadText('40k-army-lists-backup-' + stamp + '.json', serialiseForExport(valid));
        var msg = 'Backed up ' + valid.length + ' list' + (valid.length === 1 ? '' : 's');
        if (skipped) msg += ' · ' + skipped + ' skipped';
        homeFlash(msg);
      });
    }).catch(function (e) { console.warn('backup failed', e); alert('Could not back up your lists.'); });
  }

  // ── Import modal ──────────────────────────────────────────────────────────
  function openImportModal() {
    document.getElementById('import-file').value = '';
    document.getElementById('import-text').value = '';
    document.getElementById('import-err').textContent = '';
    document.getElementById('import-msg').textContent = '';
    document.getElementById('import-modal').classList.remove('hidden');
  }
  function closeImportModal() { document.getElementById('import-modal').classList.add('hidden'); }
  function closeImportOnOverlay(e) { if (e.target.id === 'import-modal') closeImportModal(); }
  function onImportFile(e) {
    var f = e.target.files && e.target.files[0];
    if (!f) return;
    var r = new FileReader();
    r.onload = function () { document.getElementById('import-text').value = r.result; };
    r.onerror = function () { document.getElementById('import-err').textContent = 'Could not read that file.'; };
    r.readAsText(f);
  }
  function doImport() {
    var err = document.getElementById('import-err');
    var msg = document.getElementById('import-msg');
    err.textContent = ''; msg.textContent = '';
    var text = document.getElementById('import-text').value.trim();
    if (!text) { err.textContent = 'Choose a file or paste list text first.'; return; }

    // Count what came in vs what survives migrate, so a newer-schema file is
    // reported (surface, don't silently drop) rather than importing nothing.
    var parsed;
    try { parsed = JSON.parse(text); }
    catch (e) { err.textContent = 'That is not valid JSON — check you pasted the whole file.'; return; }
    var incoming = Array.isArray(parsed) ? parsed
                 : (parsed && parsed.lists) ? parsed.lists
                 : (parsed && parsed.id) ? [parsed] : [];
    if (!incoming.length) { err.textContent = 'No army list found in that file.'; return; }

    var records = ListStorage.importRecords(text);   // migrated, incompatible dropped
    var dropped = incoming.length - records.length;
    if (!records.length) {
      err.textContent = dropped
        ? 'This list was saved by a newer version of the app. Update the app, then import again.'
        : 'No importable list found in that file.';
      return;
    }

    // Re-id every record so import can never overwrite a surviving list.
    var now = Date.now();
    records.forEach(function (rec) { rec.id = ListStorage.newListId(); rec.modified = now; });

    Promise.all(records.map(function (rec) { return store.put(rec); }))
      .then(function () {
        renderMyLists();
        var n = records.length;
        var note = 'Imported ' + n + ' list' + (n === 1 ? '' : 's') + '.';
        if (dropped) note += ' ' + dropped + ' skipped (newer app version).';
        msg.textContent = note;
        setTimeout(closeImportModal, 1200);
      })
      .catch(function (e) { console.warn('import failed', e); err.textContent = 'Could not save the imported list.'; });
  }

  // ── Autosave (reference model; recomputed on load) ────────────────────────
  function currentMeta() {
    return {
      id:              currentListId,
      name:            currentListMeta ? currentListMeta.name : 'Untitled',
      points_target:   POINTS_CAP,
      primary_faction: currentListMeta ? currentListMeta.primary_faction : (currentFaction ? currentFaction.name : null),
      created:         currentListMeta ? currentListMeta.created : Date.now(),
      warlord_entry_id: warlordEntryId
    };
  }
  var saveLookups = {
    unitIdFor: function (faction_ref, unit_name) {
      var u = rawUnits.find(function (x) { return x.unit_name === unit_name; });
      return u ? (u.unit_id || null) : null;
    }
  };
  function saveNow() {
    if (!store || !currentListId) return;
    var rec = ListStorage.buildRecord(currentMeta(), armyList, saveLookups);
    store.put(rec).catch(function (e) { console.warn('save failed', e); });
  }
  function scheduleSave() {
    if (currentScreen !== 'builder' || !currentListId) return;
    if (suppressAutoSave) return; // E8: hold the save until the undo toast resolves
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveNow, 400);
  }

  init();
</script>
