  function editOtherOption(listId, optName) {
    const entry = armyList.find(e => e.listId === listId);
    if (!entry) return;
    const on = !entry.otherOptions[optName];
    entry.otherOptions[optName] = on;
    // B14: options that share an exclusion_group are mutually exclusive
    // ("...can be equipped with one of the following"). Turning one on clears
    // the others in its group; turning it off just leaves the group empty
    // (the whole add is optional).
    if (on) {
      const raw = allUnits.find(u => u.unit_name === entry.unit_name);
      const opt = raw && (raw.other_options || []).find(o => o.option_name === optName);
      if (opt && opt.exclusion_group) {
        for (const o of raw.other_options) {
          if (o.option_name !== optName && o.exclusion_group === opt.exclusion_group)
            entry.otherOptions[o.option_name] = false;
        }
      }
    }
    renderDetail();
  }

  // D144: symmetric-pairwise permits(A, B) — never two of the same datasheet, and
  // either side's named list or generic "any" flag covers the other.
  function permitsCoLeader(unitA, unitB) {
    if (unitA.unit_name === unitB.unit_name) return false;
    return unitA.coLeaderWith.includes(unitB.unit_name) ||
           unitB.coLeaderWith.includes(unitA.unit_name) ||
           unitA.coLeaderAny || unitB.coLeaderAny;
  }

  // D144: full-set validation, order-independent. An incoming leader may attach to
  // a bodyguard iff it's leader-eligible for that bodyguard AND permits() holds
  // against every leader already attached there (not just the first-found one).
  function canAttachLeader(leaderUnitName, bodyguardEntry) {
    const leaderUnit = allUnits.find(u => u.unit_name === leaderUnitName);
    if (!leaderUnit) return false;
    if (!leaderUnit.leaderEligible.includes(bodyguardEntry.unit_name)) return false;
    const existingLeaders = armyList.filter(e =>
      e.attachedToListId === bodyguardEntry.listId && e.listId !== bodyguardEntry.listId
    );
    // B7a (D157): stack-size cap of 2. permitsCoLeader is pairwise-only and stays
    // correct for the pair; a 3rd attach must refuse regardless of pairwise permits.
    if (existingLeaders.length >= 2) return false;
    for (const existing of existingLeaders) {
      const existingUnit = allUnits.find(u => u.unit_name === existing.unit_name);
      if (!existingUnit) return false;
      if (!permitsCoLeader(leaderUnit, existingUnit)) return false;
    }
    return true;
  }

  // ── Render all ─────────────────────────────────────────────────────────────

  function renderAll() {
    refreshPoints();
    recomputeWarlord();
    renderBanner();
    renderRoster();
    renderList();
    renderWarlordPicker();
    renderDetail();
    scheduleSave();
  }

  // ── E9b: Warlord pick list ──────────────────────────────────────────────────
  // Eligible: resolved (non-ghost) entries whose unit carries CHARACTER and does
  // NOT carry cannot_be_warlord. "cannot" always wins over "must" per Ryan's S52
  // spec, even though no built unit today carries both.
  function eligibleWarlordEntries() {
    return armyList.filter(e => !e.unresolved).map(e => {
      const unit = allUnits.find(u => u.unit_name === e.unit_name);
      return { entry: e, unit };
    }).filter(x => x.unit && x.unit.isCharacter && !x.unit.cannotBeWarlord);
  }

  function recomputeWarlord() {
    const eligible = eligibleWarlordEntries();
    const mustBe    = eligible.filter(x => x.unit.mustBeWarlord);

    if (mustBe.length === 1) {
      // Forced pick — the must-be unit is in the list and unambiguous.
      warlordEntryId = mustBe[0].entry.listId;
    } else if (mustBe.length >= 2) {
      // E9b: two must-be units is an illegal army (Ryan's spec). Don't force a
      // pick between them — the illegal-army flag is what surfaces this, not a
      // guess at which one "wins".
    } else if (warlordEntryId != null && !eligible.some(x => x.entry.listId === warlordEntryId)) {
      // Previously-selected entry left the list, or is no longer eligible.
      warlordEntryId = null;
    }
  }

  function warlordIllegal() {
    return eligibleWarlordEntries().filter(x => x.unit.mustBeWarlord).length >= 2;
  }

  function renderWarlordPicker() {
    const el = document.getElementById('warlord-picker');
    if (!el) return;
    if (armyList.length === 0) { el.innerHTML = ''; return; }

    const eligible = eligibleWarlordEntries();
    if (eligible.length === 0) { el.innerHTML = ''; return; }

    if (warlordIllegal()) {
      const names = eligible.filter(x => x.unit.mustBeWarlord)
        .map(x => escHtml(x.entry.unit_name)).join(' and ');
      el.innerHTML = `<span class="warlord-illegal">⚠ ${names} must both be Warlord — illegal army</span>`;
      return;
    }

    // Disambiguate duplicate unit names in the dropdown (e.g. two Captains).
    const forcedPick = eligible.some(x => x.unit.mustBeWarlord);
    const optList = forcedPick ? eligible.filter(x => x.unit.mustBeWarlord) : eligible;
    const nameCounts = {};
    optList.forEach(x => { nameCounts[x.entry.unit_name] = (nameCounts[x.entry.unit_name] || 0) + 1; });
    const seen = {};
    const options = optList.map(x => {
      let label = x.entry.unit_name;
      if (nameCounts[label] > 1) {
        seen[label] = (seen[label] || 0) + 1;
        label = `${label} (${seen[label]})`;
      }
      const sel = x.entry.listId === warlordEntryId ? ' selected' : '';
      return `<option value="${x.entry.listId}"${sel}>${escHtml(label)}</option>`;
    }).join('');

    el.innerHTML = `
      <span class="warlord-label">Warlord</span>
      <select class="warlord-select" onchange="setWarlord(this.value)"${forcedPick ? ' disabled title="Forced by a must-be-Warlord rule"' : ''}>
        ${forcedPick ? '' : `<option value=""${warlordEntryId == null ? ' selected' : ''}>— none selected —</option>`}
        ${options}
      </select>`;
  }

  function setWarlord(listIdStr) {
    const listId = listIdStr === '' ? null : Number(listIdStr);
    // A must-be entry can't be overridden by picking something else while it's
    // still in the list — recomputeWarlord() re-forces it right after anyway.
    warlordEntryId = listId;
    renderAll();
  }

  function renderBanner() {
    const total     = totalPoints();
    const remaining = POINTS_CAP - total;
    const overCap   = total > POINTS_CAP;
    const bannerEl  = document.getElementById('banner-points');
    const ptsEl     = document.getElementById('banner-pts-value');
    const remEl     = document.getElementById('banner-pts-remaining');
    bannerEl.className = 'banner-points' + (overCap ? ' over-cap' : '') + (currentScreen === 'home' ? ' hidden' : '');
    ptsEl.textContent  = total;
    if (remEl) remEl.textContent = remaining;
    const nameEl = document.getElementById('banner-listname');
    if (nameEl) nameEl.textContent = currentListMeta ? currentListMeta.name : '';
    const chg = document.getElementById('banner-changed');
    if (chg) chg.classList.toggle('hidden', !hasGhosts);
  }

  // ── Render army list ───────────────────────────────────────────────────────

  function renderList() {
    const container = document.getElementById('list-items');
    const total     = armyList.length;

    document.getElementById('list-unit-count').textContent =
      total > 0 ? `${total} unit${total === 1 ? '' : 's'}` : '';

    if (armyList.length === 0) {
      container.innerHTML = '<div class="empty-state">No units added yet.<br>Click any unit in the roster to add it.</div>';
      return;
    }

    const topLevel = armyList.filter(e => !e.attachedToListId);

    const typeGroups = {};
    for (const entry of topLevel) {
      const t = entry.unit_type || 'Other';
      if (!typeGroups[t]) typeGroups[t] = [];
      typeGroups[t].push(entry);
    }
    for (const t of Object.keys(typeGroups)) {
      typeGroups[t].sort((a, b) => a.unit_name.localeCompare(b.unit_name));
    }
    const orderedTypes = [
      ...TYPE_ORDER.filter(t => typeGroups[t]),
      ...Object.keys(typeGroups).filter(t => !TYPE_ORDER.includes(t)).sort()
    ];

    let html = '';
    for (const type of orderedTypes) {
      html += `<div class="list-type-group"><div class="list-type-label">${type}</div>`;

      for (const entry of typeGroups[type]) {
        if (entry.unresolved) {
          html += `<div class="bodyguard-block"><div class="list-item ghost">
              <div class="list-item-info">
                <div class="list-item-name">${escHtml(entry.unit_name)}<span class="ghost-tag">removed</span></div>
                <div class="list-item-sub">not in current data — no longer counted</div>
              </div>
              <span class="list-item-pts ghost-pts">${entry.points != null ? entry.points + ' pts' : '—'}</span>
              <button class="remove-btn" onclick="event.stopPropagation();removeUnit(${entry.listId})" title="Remove">&times;</button>
            </div></div>`;
          continue;
        }
        const hasError   = entryHasError(entry);
        const isActive   = entry.listId === selectedListId;
        const sub        = [entry.god, entry.sizeIdx !== undefined
          ? (() => { const u = allUnits.find(u => u.unit_name === entry.unit_name); const s = u && u.sizes[entry.sizeIdx]; return s ? `${s.size} model${s.size===1?'':'s'}` : ''; })()
          : ''].filter(Boolean).join(' · ');

        const attachedLeaders = getAttachedLeaders(entry.listId);
        const hasLeaders = attachedLeaders.length > 0;

        html += `<div class="bodyguard-block${hasLeaders ? ' has-leader' : ''}">`;

        for (const leader of attachedLeaders) {
          const isLeaderActive = leader.listId === selectedListId;
          const leaderError    = entryHasError(leader);
          const leaderSub      = leader.god || '';

          html += `
            <div class="list-item${isLeaderActive ? ' active' : ''}${leaderError ? ' has-error' : ''}"
                 onclick="selectListEntry(${leader.listId})">
              <div class="list-item-info">
                <div class="list-item-name">
                  ${leader.unit_name} (${entry.unit_name})
                  ${leaderError ? '<span class="error-flag">!</span>' : ''}
                </div>
                ${leaderSub ? `<div class="list-item-sub">${leaderSub}</div>` : ''}
              </div>
              <span class="list-item-pts">${leader.points !== null ? leader.points + ' pts' : '—'}</span>
              <button class="info-btn" title="View configured datasheet"
                      onclick="event.stopPropagation();openModalConfigured(${leader.listId})">ⓘ</button>
              <button class="remove-btn" onclick="event.stopPropagation();removeUnit(${leader.listId})" title="Remove">&times;</button>
            </div>
          `;
        }

        html += `
          <div class="list-item${isActive ? ' active' : ''}${hasError ? ' has-error' : ''}"
               onclick="selectListEntry(${entry.listId})">
            <div class="list-item-info">
              <div class="list-item-name">
                ${entry.unit_name}
                ${hasError ? '<span class="error-flag">!</span>' : ''}
              </div>
              <div class="list-item-sub">${sub}</div>
            </div>
            <span class="list-item-pts">${entry.points !== null ? entry.points + ' pts' : '—'}</span>
            <button class="info-btn" title="${hasLeaders ? 'View attached unit' : 'View configured datasheet'}"
                    onclick="event.stopPropagation();${hasLeaders ? 'openModalCombined' : 'openModalConfigured'}(${entry.listId})">ⓘ</button>
            <button class="duplicate-btn" title="Duplicate"
                    onclick="event.stopPropagation();duplicateUnit(${entry.listId})">⧉</button>
            <button class="remove-btn" onclick="event.stopPropagation();removeUnit(${entry.listId})" title="Remove">&times;</button>
          </div>
        `;

        html += `</div>`;
      }

      html += `</div>`;
    }

    container.innerHTML = html;
  }

  // ── Detail panel ───────────────────────────────────────────────────────────

  function renderDetail() {
    const body    = document.getElementById('detail-body');
    const nameEl  = document.getElementById('detail-subheader-name');
    const countEl = document.getElementById('detail-subheader-count');

    if (!selectedListId) {
      nameEl.textContent  = '';
      countEl.textContent = '';
      countEl.className   = 'panel-subheader-right';
      body.innerHTML      = '<div class="detail-empty">Click a unit in the roster<br>or army list to configure it.</div>';
      return;
    }

    const entry = armyList.find(e => e.listId === selectedListId);
    if (!entry) { selectedListId = null; renderDetail(); return; }

    const unit    = allUnits.find(u => u.unit_name === entry.unit_name);
    const raw     = rawUnits.find(u => u.unit_name === entry.unit_name);
    const count   = armyList.filter(e => e.unit_name === entry.unit_name).length;
    const lim     = unitLimit(unit);
    const overLim = limitState(count, lim) === 'over';
    const isLeader = unit.leaderEligible.length > 0;

    nameEl.textContent  = entry.unit_name;
    countEl.textContent = `${count} of ${lim}`;
    countEl.className   = 'panel-subheader-right' + (overLim ? ' over-limit' : '');

    let html = '';

    if (overLim) {
      html += `<div class="over-limit-flag">⚠ Over limit — ${count} of ${lim} allowed</div>`;
    }

    if (unit.needsGod && !entry.god) {
      html += `<div class="incomplete-flag">! Choose Daemonic Allegiance</div>`;
    }

    // God selector
    if (unit.needsGod) {
      html += `<div class="detail-section-label">Daemonic Allegiance</div>`;
      html += `<div class="god-options">`;
      for (const g of GODS) {
        html += `<div class="god-option${entry.god === g ? ' chosen-' + g : ''}"
                      onclick="editGod(${entry.listId},'${g}')">${g}</div>`;
      }
      html += `</div>`;
    }

    // Size selector
    const sizes = unit.sizes;
    if (sizes.length > 1) {
      html += `<div class="detail-section-label">Unit Size</div><div class="size-options">`;
      for (let i = 0; i < sizes.length; i++) {
        const s    = sizes[i];
        const isCh = entry.sizeIdx === i;
        const copyIdx = armyList.filter(e => e.unit_name === entry.unit_name && e.listId < entry.listId).length;
        const pts = copyIdx === 0 ? s.first_unit : copyIdx === 1 ? s.second_unit : s.third_plus;
        html += `<div class="size-option${isCh ? ' chosen' : ''}" onclick="editSizeIdx(${entry.listId},${i})">
          <span class="size-option-label">${s.size} model${s.size===1?'':'s'}</span>
          <span class="size-option-pts">${pts !== null ? pts + ' pts' : '—'}</span>
        </div>`;
      }
      html += `</div>`;
    } else if (sizes.length === 1) {
      html += `<div class="detail-section-label">Unit Size</div>
        <div style="font-size:0.82rem;color:#888;margin-bottom:1.1rem;">${sizes[0].size} model${sizes[0].size===1?'':'s'}</div>`;
    }

    // Leader assignment
    if (isLeader) {
      const eligibleBgs = armyList.filter(e =>
        unit.leaderEligible.includes(e.unit_name) &&
        (e.listId === entry.attachedToListId || canAttachLeader(entry.unit_name, e))
      );
      const hasEligible = eligibleBgs.length > 0;
      let bgOptions = `<option value="">— Unattached —</option>`;
      for (const bg of eligibleBgs) {
        const god   = bg.god ? ` (${bg.god})` : '';
        const u     = allUnits.find(u => u.unit_name === bg.unit_name);
        const s     = u && u.sizes[bg.sizeIdx];
        const label = `${bg.unit_name}${god}${s ? ' · ' + s.size + ' model' + (s.size===1?'':'s') : ''}`;
        bgOptions  += `<option value="${bg.listId}" ${entry.attachedToListId === bg.listId ? 'selected' : ''}>${label}</option>`;
      }
      html += `<div class="detail-section-label">Leader Assignment</div>
        <select class="leader-assign-select" ${!hasEligible ? 'disabled' : ''}
                onchange="editLeaderTarget(${entry.listId},this.value)">
          ${bgOptions}
        </select>`;
      if (!hasEligible) {
        html += `<div class="leader-hint">Add an eligible bodyguard unit first: ${unit.leaderEligible.join(', ')}</div>`;
      }
    }

    // Wargear options — loadout-defined units use the structured grouped UI;
    // everything else uses the existing wargear/other-options rendering.
    const loDef = loadoutFor(entry);
    if (loDef) {
      html += buildLoadoutHtml(entry, loDef, raw);
      // A loadout-defined unit can still own a bundle for compound swaps the
      // loadout parser can't express (e.g. Captain's pistol+melee combos and the
      // relic-shield grant). Render the bundle picker alongside; the loadout
      // options the bundle covers are suppressed inside buildLoadoutHtml.
      if (raw && raw.bundled_swaps && raw.bundled_swaps.length > 0) {
        html += buildWargearHtml(entry, raw);
      }
      // Other Options (B14 item-adds like Helix Gauntlet, Auspex Array, Watcher)
      // are independent of bundles — render whenever present, or when a chosen
      // bundle endpoint grants read-only lines.
      if (raw && ((raw.other_options && raw.other_options.length > 0) ||
                  activeBundleGrants(entry, raw).length > 0)) {
        html += buildOtherOptionsHtml(entry, raw);
      }
    } else {
      if (raw && ((raw.wargear_options && raw.wargear_options.length > 0) ||
                  (raw.bundled_swaps && raw.bundled_swaps.length > 0))) {
        html += buildWargearHtml(entry, raw);
      }
      if (raw && ((raw.other_options && raw.other_options.length > 0) ||
                  activeBundleGrants(entry, raw).length > 0)) {
        html += buildOtherOptionsHtml(entry, raw);
      }
    }

    // Points display
    html += `<div class="detail-pts-row">
      <div class="detail-pts-value">${entry.points !== null ? entry.points : '—'}</div>
      <div class="detail-pts-label">Points</div>
    </div>`;

    body.innerHTML = html;
  }

  // ── Bundle helpers ─────────────────────────────────────────────────────────
  // A bundle group always resolves to exactly one endpoint: the stored choice,
  // or its default when the state is unset. The radio can never be cleared.
  function bundleChosenEndpoint(entry, bundle, gi) {
    const eps = bundle.endpoints || [];
    const def = eps.find(e => e.is_default) || eps[0] || null;
    const chosenId = entry.wargear[`bundle_${gi}`] || (def ? def.id : null);
    return eps.find(e => e.id === chosenId) || def;
  }

  // Every grant currently active from chosen bundle endpoints, across all groups.
  function activeBundleGrants(entry, raw) {
    const out = [];
    (raw.bundled_swaps || []).forEach((bundle, gi) => {
      const ep = bundleChosenEndpoint(entry, bundle, gi);
      if (ep && ep.grants) out.push(...ep.grants);
    });
    return out;
  }

  // Read a rules/wargear ability's text into a structured characteristic
  // override. Recognizes the fixed 40K phrasings that set a model stat; anything
  // else returns {}. This is the general reader that replaces per-effect
  // hardcoding (e.g. the old Shining Aegis special-case).
  function statOverrideFromText(text) {
    const out = {};
    if (!text) return out;
    const t = String(text);
    let m;
    if ((m = t.match(/(\d)\+\s*invulnerable save/i)) ||
        (m = t.match(/invulnerable save of\s*(\d)\+/i)))      out.INV = m[1];
    if ((m = t.match(/Wounds characteristic of\s*(\d+)/i)))   out.W   = m[1];
    if ((m = t.match(/Save characteristic of\s*(\d)\+/i)))    out.SV  = m[1];
    if ((m = t.match(/Feel No Pain\s*(\d)\+/i)))              out.FNP = m[1];
    return out;
  }

  // Merge stat overrides from all active grants. The reader derives the effect
  // from the grant's rules text; an explicit authored stat_override wins if
  // present (escape hatch for text the reader can't parse).
  function activeStatOverrides(entry, raw) {
    const ov = {};
    for (const g of activeBundleGrants(entry, raw)) {
      Object.assign(ov, statOverrideFromText(g.carrier_notes));
      if (g.stat_override) Object.assign(ov, g.stat_override);
    }
    return ov;
  }

  // B14: a checked optional wargear item (Other Options) confers its stat
  // through the same reader, from the carrier_notes the transform attached.
  // Only unconditional set-value text is present there (the transform blanks
  // conditional/summon cases), so e.g. a checked Helix Gauntlet -> Feel No Pain
  // 6+, while Watcher in the Dark carries no text and confers nothing here.
  function activeOtherOptionOverrides(entry, raw) {
    const ov = {};
    for (const opt of (raw.other_options || [])) {
      if (entry.otherOptions[opt.option_name] && opt.carrier_notes)
        Object.assign(ov, statOverrideFromText(opt.carrier_notes));
    }
    return ov;
  }

  // Characteristic overrides conferred by the unit's currently-active weapons and
  // wargear selections, read from their ability text. Handles both abilities
  // carried on an active weapon profile and an active wargear whose NAME is
  // itself a defined weapon ability with no profile of its own (e.g. the Shining
  // aegis shield). Replaces the former Shining Aegis hardcode.
  function activeWeaponStatOverrides(raw, mg, activeBases, replacedBases) {
    const ov = {};
    const abilNames = new Set();
    for (const w of raw.weapons) {
      if (w.model_group !== mg.model_group) continue;
      const base = weaponBase(w.weapon_name);
      const active = activeBases.has(base) || (w.is_base_equipment && !replacedBases.has(base));
      if (active) for (const n of (w.weapon_ability_names || [])) abilNames.add(n);
    }
    // An active wargear whose NAME is itself a defined weapon ability but which
    // has no weapon profile (e.g. the Shining aegis shield). Skip anything the
    // broad wargear-ability surface already owns (Storm Shield, Shield Dome,
    // Watcher in the Dark, …) — those are handled/asterisked by that pass, not
    // here, so we don't double-apply or mis-apply a bearer-only/conditional one.
    const covered = broadWargearAbilitySet();
    for (const key of Object.keys(weaponAbilitiesLookup)) {
      if (covered.has(key)) continue;
      if (activeBases.has(key.toLowerCase())) abilNames.add(key);
    }
    for (const n of abilNames) Object.assign(ov, statOverrideFromText(weaponAbilitiesLookup[n]));
    return ov;
  }

  // The set of ability names surfaced via any unit's wargear_ability_names — the
  // "broad" conferred-wargear surface deferred to its own pass (B12-broad/E17).
  // Cached; recomputed only if the unit set changes.
  let _broadWargearAbilSet = null, _broadWargearAbilSrc = null;
  function broadWargearAbilitySet() {
    if (_broadWargearAbilSet && _broadWargearAbilSrc === armyData) return _broadWargearAbilSet;
    const s = new Set();
    for (const blk of (armyData || [])) {
      for (const u of (blk.units || [])) {
        for (const g of (u.model_groups || [])) {
          for (const n of (g.wargear_ability_names || [])) s.add(n);
        }
      }
    }
    _broadWargearAbilSet = s; _broadWargearAbilSrc = armyData;
    return s;
  }

  // B15: read an ability's text into a stat override, keeping only the parts
  // that are unconditional. Splits into sentences and drops any sentence carrying
  // a conditional/summon marker, so e.g. the Lion Helm's unit-wide invuln (a plain
  // sentence) is kept while its once-per-battle summoned Feel No Pain is rejected.
  const _condMarker =
    /(once per (?:battle|turn|game)|in addition|instead of|each time|against |summon|when it does|until the end of)/i;
  function unconditionalStatOverride(text) {
    const out = {};
    if (!text) return out;
    for (const sentence of String(text).split(/\.\s+/)) {
      if (_condMarker.test(sentence)) continue;
      Object.assign(out, statOverrideFromText(sentence));
    }
    return out;
  }

  // Largest model count declared on a unit's variant record (0 if none present).
  function unitMaxModels(raw) {
    const u = allUnits.find(x => x.unit_name === raw.unit_name);
    const sizes = (u && u.sizes) || [];
    return sizes.reduce((m, s) => Math.max(m, s.size || 0), 0);
  }
  // A model group is a confident single-model group (its "bearer" is the only
  // model) when the unit is a Vehicle/Monster, or it has one group whose max size
  // is 1, or it is a lone Character/Epic Hero record that carries no size bracket.
  function isSingleModelGroup(raw) {
    const t = raw.unit_type || '';
    if (t === 'Vehicle' || t === 'Monster') return true;
    if (raw.model_groups.length !== 1) return false;
    const mx = unitMaxModels(raw);
    if (mx === 1) return true;
    if (mx === 0 && (t === 'Character' || t === 'Epic Hero')) return true;
    return false;
  }

  // ── B15 / D105: conferred wargear characteristics ─────────────────────────
  //
  // Ability text is read from the unit's OWN datasheet row, never by item name
  // (D70). `dsWargearAbilities` carries that; the flat name-keyed glossary is a
  // fallback only, and it is provably wrong wherever a name collides (Storm
  // Shield: W4 on Terminator Assault Squad, W6 on Wolf Guard Battle Leader,
  // INV4+ on Lieutenant).
  function wargearAbilityDesc(raw, name) {
    const t = dsWargearAbilities[raw && raw.unit_id];
    return (t && t[name]) || glossaryDesc(name);
  }

  // Does this loadout def name the item anywhere at all — as default gear, as a
  // swap source, or as anything a swap/add can hand out? If not, the item is not
  // representable in the rollup and carriers cannot be counted; the caller falls
  // back to the legacy uniform/bearer heuristic rather than silently reporting
  // "nobody has it".
  function loDefNamesItem(def, name) {
    const want = weaponBase(name);
    const seen = new Set();
    const eat = v => { for (const p of loWeaponParts(v)) seen.add(p); };
    for (const g of (def.model_groups || [])) {
      for (const w of (g.default_weapons || [])) eat(w);
      for (const w of (g.default_wargear || [])) eat(w);
    }
    for (const o of (def.options || [])) {
      eat(o.replaces); eat(o.replacement); eat(o.adds_weapon); eat(o.equipment);
      for (const c of [].concat(o.choices || [], o.replacement_choices || [],
                                o.equipment_choices || [], o.equipment_parts || [])) eat(c);
    }
    return seen.has(want);
  }

  // units.json splits a unit into STATLINE groups; unit_loadouts.json splits it into
  // LOADOUT groups, and the two namings do not line up in general (9 of our 16 named
  // statline groups don't). Where every model named in a statline group resolves to a
  // loadout group, carriers can be counted inside that group; where it can't, they
  // can only be counted unit-wide, and a unit-wide count must never be written to one
  // group's statline — a Hunting Wolf does not get a Wolf Guard's storm shield.
  // Returns the loadout group names to count over, or null = "cannot attribute".
  function statGroupScopes(raw, mg, def) {
    const names = (def.model_groups || []).map(g => g.name);
    if (raw.model_groups.length <= 1) return names;   // one statline = the whole unit
    // D135/B44: units.json can carry an authoritative loadout_groups mapping on the
    // statline group itself, built by hand against the datasheet composition tables.
    // When present, trust it outright and skip the name-heuristic below — the
    // heuristic is exactly what misses Wolf Scouts' Pack Leader and can't attribute
    // Outrider Squad at all.
    if (Array.isArray(mg.loadout_groups) && mg.loadout_groups.length) {
      const out = [];
      for (const g of mg.loadout_groups) {
        if (!names.includes(g)) return null;           // mapping stale vs def -> cannot attribute
        if (!out.includes(g)) out.push(g);
      }
      return out;
    }
    const norm = x => String(x).toLowerCase().replace(/\s*-\s*epic hero$/, '').replace(/\*+$/, '').trim();
    const index = {};
    for (const n of names) index[norm(n)] = n;
    const want = String(mg.model_group || '').split(',').map(norm).filter(Boolean);
    if (!want.length) return null;
    const out = [];
    for (const w of want) {
      if (!index[w]) return null;                     // unmapped -> cannot attribute
      if (!out.includes(index[w])) out.push(index[w]);
    }
    return out;
  }

  // D105: how many models in the CONFIGURED statline group carry the item, out of how
  // many models that group has. `entry` null => the default loadout (the browse view,
  // and what the printed datasheet shows). Returns null when the item cannot be
  // counted, which means "use the legacy heuristic". `attributable: false` means the
  // count is unit-wide and cannot be pinned to this statline group, so the caller must
  // cap at an asterisk and never write a value.
  function wargearCarrierState(raw, mg, entry, name) {
    const def = loadoutDefs[raw.unit_id];
    if (!def || !loDefNamesItem(def, name)) return null;
    const size = entry ? loadoutSize(entry, def)
                       : ((def.size_brackets && def.size_brackets[0]) || 0);
    const sel  = entry ? loadoutSelections(entry, def)
                       : { choiceById: {}, countById: {}, addById: {} };
    const scopes = statGroupScopes(raw, mg, def);
    const attributable = scopes !== null;
    const use = scopes || (def.model_groups || []).map(g => g.name);
    const counts = loGroupCounts(def, size, loOptCounts(def, entry));
    let models = 0, carriers = 0;
    for (const g of use) {
      models   += counts[g] || 0;
      carriers += loCarriers(def, size, sel, g, name);
    }
    // An optional group with no models in this build has no carriers — that is a real
    // zero, not an unknown, so it must not fall through to the legacy heuristic (which
    // would asterisk a Hunting Wolf for a storm shield it cannot hold).
    if (models <= 0) return { carriers: 0, models: 0, attributable: attributable };
    return { carriers: Math.min(carriers, models), models: models, attributable: attributable };
  }

  // B46: every wargear ability this unit's OWN datasheet defines — the default-issue
  // ones units.json lists, plus the OPTION-granted ones only
  // datasheet_wargear_abilities.json carries. units.json's wargear_ability_names is
  // default-issue only, so reading it alone hides e.g. the Reiver's grav-chute text
  // from every popup even though the text is in the data.
  function allWargearAbilityNames(raw) {
    const out = [];
    for (const g of (raw.model_groups || []))
      for (const n of (g.wargear_ability_names || [])) if (!out.includes(n)) out.push(n);
    const ds = dsWargearAbilities[raw && raw.unit_id] || {};
    for (const n of Object.keys(ds)) if (!out.includes(n)) out.push(n);
    return out;
  }

  // Unit-wide carrier count. The popup's Wargear Abilities section is a unit-level
  // section, not a per-statline-group one, so it counts over every loadout group.
  // null = the item is not representable in the loadout; the caller then falls back
  // to the other-option checkbox or to the default-issue reading.
  function wargearCarrierStateUnit(raw, entry, name) {
    const def = loadoutDefs[raw.unit_id];
    if (!def || !loDefNamesItem(def, name)) return null;
    const size = entry ? loadoutSize(entry, def)
                       : ((def.size_brackets && def.size_brackets[0]) || 0);
    const sel  = entry ? loadoutSelections(entry, def)
                       : { choiceById: {}, countById: {}, addById: {} };
    const counts = loGroupCounts(def, size, loOptCounts(def, entry));
    let models = 0, carriers = 0;
    for (const g of (def.model_groups || [])) {
      models   += counts[g.name] || 0;
      carriers += loCarriers(def, size, sel, g.name, name);
    }
    if (models <= 0) return { carriers: 0, models: 0 };
    return { carriers: Math.min(carriers, models), models: models };
  }

  // B46 / D112: the statline's three-way rule, applied to the CONFIGURED popup's
  // Wargear Abilities list.
  //
  //   'all'  -> plain row
  //   'some' -> row marked with an asterisk: not every model carries the item
  //   'none' -> nothing in this build carries it; the row is not rendered
  //
  // Sources in precedence order: a bundle grant; the loadout (canonical wherever the
  // item is representable there — the Reiver grav-chute is both a loadout add and a
  // B14 other-option, and the loadout wins); a B14 other-option checkbox; and finally
  // default-issue gear. A unit-wide aura from one bearer ("models in the bearer's unit
  // have…") needs one carrier, not all of them, exactly as the statline pass reads it.
  function wargearAbilityMode(raw, entry, name) {
    const text    = wargearAbilityDesc(raw, name) || '';
    const uniform = /models in (?:the )?(?:bearer.?s )?unit have/i.test(text);
    const single  = isSingleModelGroup(raw);
    const spread  = () => (uniform || single) ? 'all' : 'some';

    const gated = new Set();
    for (const b of (raw.bundled_swaps || []))
      for (const ep of (b.endpoints || []))
        for (const g of (ep.grants || [])) if (g.ability_name) gated.add(g.ability_name);
    if (gated.has(name)) {
      return activeBundleGrants(entry, raw).some(g => g.ability_name === name)
        ? spread() : 'none';
    }

    const st = wargearCarrierStateUnit(raw, entry, name);
    if (st) {
      if (st.carriers <= 0) return 'none';
      if (uniform) return 'all';
      return st.carriers >= st.models ? 'all' : 'some';
    }

    const oo = (raw.other_options || []).find(
      o => o.ability_name === name || o.option_name === name);
    if (oo) return (entry && entry.otherOptions[oo.option_name]) ? spread() : 'none';

    return spread();
  }

  // The one place the three-way D105 rule lives. For a model group, returns the
  // characteristic overrides that reach the statline, the cells that get an
  // asterisk instead, and the ability names that confer nothing in this build.
  //
  //   every model carries it   -> override written (W / SV / INV / FNP, literally,
  //                               as an absolute set: "Wounds characteristic of 6")
  //   some but not all         -> statline untouched; asterisk to the rules text (D75)
  //   no model carries it      -> nothing; the ability is inert in this build
  //
  // Dynamic on the configured loadout, not static per datasheet: the same unit
  // moves between clean and asterisked as it is built. Guards kept from D88:
  // abilities that are ALSO a bundle/other-option grant belong to the active-grant
  // path; text under a conditional/summon clause is never read.
  function conferredStats(raw, mg, entry) {
    const ov = {}, flags = {}, inert = new Set();
    const names = (mg && mg.wargear_ability_names) || [];
    if (!names.length) return { ov, flags, inert };
    const gated = new Set();
    for (const b of (raw.bundled_swaps || []))
      for (const ep of (b.endpoints || []))
        for (const g of (ep.grants || [])) if (g.ability_name) gated.add(g.ability_name);
    for (const o of (raw.other_options || [])) if (o.ability_name) gated.add(o.ability_name);

    const single = isSingleModelGroup(raw);
    for (const n of names) {
      if (gated.has(n)) continue;
      const text   = wargearAbilityDesc(raw, n);
      const parsed = unconditionalStatOverride(text);
      const keys   = Object.keys(parsed);
      if (!keys.length) continue;
      // "models in the bearer's unit have…" is a unit-wide aura from one bearer
      // (Lion Helm). It needs one carrier, not all of them.
      const uniform = /models in (?:the )?(?:bearer.?s )?unit have/i.test(text);
      const st = wargearCarrierState(raw, mg, entry, n);

      let mode;
      if (st) {
        if (st.carriers <= 0)                   mode = 'none';
        else if (!st.attributable)              mode = 'some';   // can't pin it to this group
        else if (uniform)                       mode = 'all';
        else if (st.carriers >= st.models)      mode = 'all';
        else                                    mode = 'some';
      } else {
        // Legacy fallback: the item isn't representable in the loadout, so assume
        // it is default-issue (that is what wargear_ability_names means) and use
        // the old uniform / single-model / bearer-on-multi-model heuristic.
        mode = (uniform || single) ? 'all' : 'some';
      }

      if (mode === 'none') { inert.add(n); continue; }
      if (mode === 'all')  { for (const k of keys) ov[k] = parsed[k]; continue; }
      for (const k of keys) flags[k] = true;
    }
    return { ov, flags, inert };
  }

  // Weapon add/remove from the chosen bundle endpoints. Loadout-defined units
  // (e.g. Captain) roll up weapons from loadout selections and don't otherwise
  // know about bundles, so this delta is applied to the weapon display so a
  // bundle choice actually changes the shown weapons.
  function activeBundleWeaponDelta(entry, raw) {
    const removes = [], adds = [];
    (raw.bundled_swaps || []).forEach((bundle, gi) => {
      const ep = bundleChosenEndpoint(entry, bundle, gi);
      if (!ep) return;
      for (const r of (ep.removes || [])) removes.push(r);
      for (const a of (ep.adds || [])) adds.push(a);
    });
    return { removes, adds };
  }

  // Base weapon families any bundle endpoint can remove — these slots are owned
  // by the bundle, so the parser-generated loadout options for them are hidden.
  function bundleManagedFamilies(raw) {
    const fam = new Set();
    for (const b of ((raw && raw.bundled_swaps) || []))
      for (const ep of (b.endpoints || []))
        for (const r of (ep.removes || [])) fam.add(weaponBase(r));
    return fam;
  }

  // Whether a bundle currently owns the shared weapon slots, so the loadout
  // options for those slots must be hidden. An 'owns' bundle (Captain) always
  // does; an 'alternative' bundle (Lieutenant's atomic 3-for-3) does so only
  // while its non-default endpoint is chosen — that's the cross-exclusivity:
  // picking the atomic swap hides the per-slot swaps, and clearing it brings
  // them back.
  // B36. A bundle endpoint's `removes` set and a loadout choice option's `replaces`
  // set can describe the *same* swap — the Lieutenant's atomic
  // "bolt pistol + master-crafted bolter + close combat weapon -> neo-volkite,
  // master-crafted power weapon, storm shield" is written once in bundled_swaps and
  // once in unit_loadouts.json. Rendering both showed the neo-volkite twice, and the
  // duplicate's three-weapon `replaces` transitively glued the three single-slot swaps
  // into one B25 radio cluster, so a legal plasma pistol + power fist build became
  // unreachable. The bundle is the single control for a swap it already owns, so a
  // loadout option whose replaced-weapon set exactly equals some endpoint's removes
  // set is dropped — always, not only while the bundle is engaged.
  function bundleDuplicateSwaps(raw) {
    const key = (arr) => arr.map(weaponBase).sort().join('|');
    const dup = new Set();
    for (const b of ((raw && raw.bundled_swaps) || []))
      for (const ep of (b.endpoints || []))
        if ((ep.removes || []).length) dup.add(key(ep.removes));
    return dup;
  }

  function bundleSuppressesLoadout(entry, raw) {
    const bs = (raw && raw.bundled_swaps) || [];
    for (let gi = 0; gi < bs.length; gi++) {
      const bundle = bs[gi];
      if ((bundle.loadout_relation || 'owns') === 'owns') return true;
      const eps = bundle.endpoints || [];
      const def = eps.find(e => e.is_default) || eps[0];
      const ep = bundleChosenEndpoint(entry, bundle, gi);
      if (ep && def && ep.id !== def.id) return true;
    }
    return false;
  }

  function buildWargearHtml(entry, raw) {
    const options  = raw.wargear_options;
    const groups   = {};
    const independent = [];

    for (const opt of options) {
      if (opt.is_choice && opt.option_group) {
        if (!groups[opt.option_group]) groups[opt.option_group] = [];
        groups[opt.option_group].push(opt);
      } else {
        independent.push(opt);
      }
    }

    let html = `<div class="detail-section-label" style="color:#666;margin-bottom:0.6rem;">Wargear Options</div>`;

    for (const [groupKey, opts] of Object.entries(groups)) {
      const stateKey = `group_${groupKey}`;
      const chosen   = entry.wargear[stateKey] || null;
      // Collapse options that are the same family (e.g. "Axe of Khorne – strike"
      // and "– sweep") to one selectable line; keep distinct families separate
      // (e.g. Rod of sorcery vs Baleful sword stay two real choices).
      const seenBase = new Set();
      const famOpts  = [];
      for (const opt of opts) {
        const b = weaponBase(opt.replacement_weapon_name);
        if (seenBase.has(b)) continue;
        seenBase.add(b);
        famOpts.push(opt);
      }
      const listNames = famOpts.map(o => o.replacement_weapon_name).concat([opts[0].weapon_replaced]);
      const listPair  = mkDetail('list', groupDetailHtml(raw, listNames));
      const picked    = chosen ? 1 : 0;
      html += `<div class="options-block"><div class="detail-section-label lo-heading-row"><span>Replace ${stripProfile(opts[0].weapon_replaced)}</span><span class="lo-head-right"><span class="lo-count">${picked}/1</span>${listPair.btn}</span></div>${listPair.panel}`;
      for (const opt of famOpts) {
        const display = stripProfile(opt.replacement_weapon_name);
        const isCh    = weaponBase(chosen) === weaponBase(opt.replacement_weapon_name);
        const d       = mkDetail('eye', itemDetailHtml(raw, opt.replacement_weapon_name));
        html += `<div class="option-item radio${isCh ? ' chosen' : ''}"
                      onclick="editWargearGroup(${entry.listId},'${esc(stateKey)}','${esc(display)}')">
          <div class="option-item-row">
            <div class="option-check">${isCh ? '●' : ''}</div>
            <div class="option-item-name">${display}</div>${d.btn}
          </div>
        </div>${d.panel}`;
      }
      html += `</div>`;
    }

    // Independent swaps keyed by the family being replaced, so a multi-profile
    // weapon (e.g. Bilesword strike + sweep -> Doomsday bell) shows one line.
    const indepByWeapon = {};
    for (const opt of independent) {
      const key = weaponBase(opt.weapon_replaced);
      if (!indepByWeapon[key]) indepByWeapon[key] = [];
      indepByWeapon[key].push(opt);
    }

    for (const [replacedBase, opts] of Object.entries(indepByWeapon)) {
      const stateKey = `indep_${replacedBase}`;
      const isCh     = !!entry.wargear[stateKey];
      const listPair = mkDetail('list', groupDetailHtml(raw, [opts[0].replacement_weapon_name, opts[0].weapon_replaced]));
      const d        = mkDetail('eye', itemDetailHtml(raw, opts[0].replacement_weapon_name));
      html += `<div class="options-block"><div class="detail-section-label lo-heading-row"><span>Optional Swap</span><span class="lo-head-right"><span class="lo-count">${isCh ? 1 : 0}/1</span>${listPair.btn}</span></div>${listPair.panel}
        <div class="option-item${isCh ? ' chosen' : ''}" onclick="editWargearIndep(${entry.listId},'${esc(stateKey)}')">
          <div class="option-item-row">
            <div class="option-check">${isCh ? '✓' : ''}</div>
            <div class="option-item-name">${stripProfile(opts[0].weapon_replaced)} → ${stripProfile(opts[0].replacement_weapon_name)}</div>${d.btn}
          </div>
        </div>${d.panel}
      </div>`;
    }

    // Bundled / compound swaps: one mutually-exclusive group whose endpoints
    // each add a SET of weapon families and remove a SET, with an explicit
    // default radio. Every endpoint is self-contained — no show/hide dependency.
    // The radio is default-pre-selected and can never be cleared to nothing.
    if (raw.bundled_swaps && raw.bundled_swaps.length > 0) {
      raw.bundled_swaps.forEach((bundle, gi) => {
        const stateKey = `bundle_${gi}`;
        const chosenEp = bundleChosenEndpoint(entry, bundle, gi);
        const chosen   = chosenEp ? chosenEp.id : null;
        const eps      = bundle.endpoints || [];
        // Counter: how many non-default endpoints exist, and whether one is picked.
        const nonDefault = eps.filter(ep => !ep.is_default).length;
        const pickedBundle = (chosenEp && !chosenEp.is_default) ? 1 : 0;
        const bundleListNames = [];
        for (const ep of eps) for (const w of (ep.adds || [])) bundleListNames.push(w);
        const listPair = mkDetail('list', groupDetailHtml(raw, bundleListNames));
        html += `<div class="options-block"><div class="detail-section-label lo-heading-row"><span>${bundle.option_group || 'Weapons'}</span><span class="lo-head-right"><span class="lo-count">${pickedBundle}/${Math.max(1, nonDefault)}</span>${listPair.btn}</span></div>${listPair.panel}`;
        for (const ep of eps) {
          const isCh = chosen === ep.id;
          const pts  = ep.points_cost ? ` <span style="color:#888;font-size:0.7rem;">(+${ep.points_cost})</span>` : '';
          const d    = mkDetail('eye', endpointDetailHtml(raw, ep));
          html += `<div class="option-item radio${isCh ? ' chosen' : ''}"
                        onclick="editWargearBundle(${entry.listId},'${esc(stateKey)}','${esc(ep.id)}')">
            <div class="option-item-row">
              <div class="option-check">${isCh ? '●' : ''}</div>
              <div class="option-item-name">${ep.label}${pts}</div>${d.btn}
            </div>
            ${(isCh && ep.grants && ep.grants.length) ? ep.grants.map(g =>
              `<div class="option-item-note">Grants ${g.option_name}${g.carrier_notes ? ' — ' + g.carrier_notes : ''}</div>`).join('') : ''}
          </div>${d.panel}`;
        }
        html += `</div>`;
      });
    }

    return html;
  }

  function buildOtherOptionsHtml(entry, raw) {
    // Some options are double-sourced: present both as a loadout group and as a
    // B14 other_option (e.g. Watcher in the Dark on Deathwing units). The loadout
    // group is canonical, so suppress the matching other_option here to avoid a
    // duplicate control. Match on normalized label.
    const _lo = loadoutFor(entry);
    // A B14 other_option that is ALSO offered by the loadout is double-sourced;
    // the loadout control is canonical, so suppress the checkbox. Match on the
    // loadout option's label/group AND on the item names it offers inside
    // choices / equipment_choices / equipment (B48: Corvus Blackstar's auspex
    // array + infernum halo-launcher live in ach_4.choices, so a label-only
    // match missed them and both a radio and a checkbox rendered). ach_4 carries
    // a 'None' row, so suppressing the checkboxes leaves the empty state reachable.
    const _loLabels = new Set();
    for (const o of (_lo && _lo.options ? _lo.options : [])) {
      const add = v => { const s = (v || '').toString().trim().toLowerCase(); if (s) _loLabels.add(s); };
      add(o.label || o.group);
      for (const c of (o.choices || [])) add(c);
      for (const c of (o.equipment_choices || [])) add(c);
      add(o.equipment);
    }
    const visible = (raw.other_options || []).filter(
      opt => !_loLabels.has((opt.option_name || '').trim().toLowerCase()));
    const picked = visible.filter(opt => !!entry.otherOptions[opt.option_name]).length;
    // The ☰ detail for the whole group: the rules text of every option here.
    const listPair = mkDetail('list', groupDetailHtml(raw, visible.map(o => o.ability_name || o.option_name)));
    let html = `<div class="detail-section-label lo-heading-row" style="margin-bottom:0.45rem;"><span>Unit Options</span><span class="lo-head-right"><span class="lo-count">${picked}/${visible.length}</span>${listPair.btn}</span></div>${listPair.panel}<div class="options-block">`;
    for (const opt of visible) {
      const isCh = !!entry.otherOptions[opt.option_name];
      const d    = mkDetail('eye', itemDetailHtml(raw, opt.ability_name || opt.option_name));
      html += `<div class="option-item${isCh ? ' chosen' : ''}"
                    onclick="editOtherOption(${entry.listId},'${esc(opt.option_name)}')">
        <div class="option-item-row">
          <div class="option-check">${isCh ? '✓' : ''}</div>
          <div class="option-item-name">${opt.option_name}</div>${d.btn}
        </div>
        ${opt.carrier_notes ? `<div class="option-item-note">${opt.carrier_notes}</div>` : ''}
      </div>${d.panel}`;
    }
    // Read-only lines granted by the currently chosen bundle endpoint(s).
    for (const g of activeBundleGrants(entry, raw)) {
      const d = mkDetail('eye', itemDetailHtml(raw, g.ability_name || g.option_name));
      html += `<div class="option-item granted">
        <div class="option-item-row">
          <div class="option-check">◆</div>
          <div class="option-item-name">${g.option_name} <span style="color:#888;font-size:0.65rem;">(granted)</span></div>${d.btn}
        </div>
        ${g.carrier_notes ? `<div class="option-item-note">${g.carrier_notes}</div>` : ''}
      </div>${d.panel}`;
    }
    html += `</div>`;
    return html;
  }

  // ── Stat Modal ─────────────────────────────────────────────────────────────

  function openModalFull(unitName) {
    const raw = rawUnits.find(u => u.unit_name === unitName);
    if (!raw) return;
    document.getElementById('modal-title').textContent = unitName;
    document.getElementById('modal-mode-badge').textContent = 'Full Datasheet';
    document.getElementById('modal-body').innerHTML = buildModalFull(raw);
    document.getElementById('stat-modal').classList.remove('hidden');
  }

  function openModalConfigured(listId) {
    const entry = armyList.find(e => e.listId === listId);
    if (!entry) return;
    const raw = rawUnits.find(u => u.unit_name === entry.unit_name);
    if (!raw) return;
    document.getElementById('modal-title').textContent = entry.unit_name;
    document.getElementById('modal-mode-badge').textContent = 'Configured';
    document.getElementById('modal-body').innerHTML = buildModalConfigured(raw, entry);
    document.getElementById('stat-modal').classList.remove('hidden');
  }

  // B7b: combined attached-unit popup. Fires from the bodyguard's ⓘ when one or
  // more leaders are attached. Renders each leader first (attach order), then the
  // bodyguard last, using the existing buildModalConfigured for each member —
  // this matches the center Army List panel's stacking order (B53, S96).
  // The bodyguard's stat table receives the union of every attached leader's
  // `bodyguard_stat_flags` as aura markers (asterisks on affected stats).
  function openModalCombined(bodyguardListId) {
    const bodyguard = armyList.find(e => e.listId === bodyguardListId);
    if (!bodyguard) return;
    const leaders = getAttachedLeaders(bodyguardListId);
    if (leaders.length === 0) {
      openModalConfigured(bodyguardListId);
      return;
    }
    const bgRaw = rawUnits.find(u => u.unit_name === bodyguard.unit_name);
    if (!bgRaw) return;

    // Compute the aura-flag union across every attached leader's first mg.
    const auraSet = new Set();
    for (const leader of leaders) {
      const lraw = rawUnits.find(u => u.unit_name === leader.unit_name);
      if (!lraw || !lraw.model_groups || !lraw.model_groups[0]) continue;
      const flags = lraw.model_groups[0].bodyguard_stat_flags || [];
      for (const f of flags) auraSet.add(f);
    }
    const auraFlags = Array.from(auraSet);

    // Composite title: bodyguard + leader1 + leader2 (attach order).
    const memberNames = [bodyguard.unit_name].concat(leaders.map(l => l.unit_name));
    document.getElementById('modal-title').textContent = memberNames.join(' + ');
    document.getElementById('modal-mode-badge').textContent = 'Attached Unit';
    document.getElementById('modal-body').innerHTML = buildModalCombined(bodyguard, bgRaw, leaders, auraFlags);
    document.getElementById('stat-modal').classList.remove('hidden');
  }

  function buildModalCombined(bodyguard, bgRaw, leaders, auraFlags) {
    // Each leader first, in attach order, plain panels (no aura pass — leader ⓘ
    // reciprocals not populated this pass per D157/D159). Bodyguard panel last,
    // with aura flags applied — matches the center panel's stacking (B53, S96).
    let html = '';
    for (const leader of leaders) {
      const lraw = rawUnits.find(u => u.unit_name === leader.unit_name);
      if (!lraw) continue;
      html += `<div class="combined-member-header">${leader.unit_name}</div>`;
      html += buildModalConfigured(lraw, leader);
      html += '<hr class="combined-member-divider">';
    }
    html += `<div class="combined-member-header">${bodyguard.unit_name}</div>`;
    html += buildModalConfigured(bgRaw, bodyguard, auraFlags);
    return html;
  }

  function closeModal() {
    document.getElementById('stat-modal').classList.add('hidden');
  }

  function closeModalOnOverlay(event) {
    if (event.target === document.getElementById('stat-modal')) closeModal();
  }

  // ESC key closes modal
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // ── Modal: Full view ───────────────────────────────────────────────────────

  // Strip a trailing parameter so a weapon/core ability matches its base entry
  // in the core glossary: "Rapid Fire 1"->"Rapid Fire", "Anti-Vehicle 4+"->"Anti",
  // "Feel No Pain 5+"->"Feel No Pain", "Scouts 8\""->"Scouts".
  function baseAbilityName(name) {
    if (!name) return name;
    if (/^Anti-/i.test(name)) return 'Anti';
    return name.replace(/\s+(D?\d+\+?|\d+")\s*$/, '').trim();
  }
  // Description for a rule / weapon ability, trying datasheet lookups first, then
  // the curated core-rules glossary (exact, then base name).
  function glossaryDesc(name) {
    return rulesLookup[name] || abilitiesLookup[name] || weaponAbilitiesLookup[name]
        || coreGlossaryLookup[name] || coreGlossaryLookup[baseAbilityName(name)] || '';
  }

  // ── Structured loadout model: composition + options -> weapon counts ───────
  let loadoutDefs = {};   // unit_id -> definition
  let wargearPoints = {}; // unit_id -> { items: { lowercased item name -> {cost, display, source} } }

  function loMaxCount(opt, size, groupN) {
    // per_n_models is written against the whole unit ("1 per 5 models"), so it can
    // exceed the models actually in the option's scope group — a 1-model Sergeant, or
    // a 9-model body inside a 10-model unit. With no authored max_total to trust, the
    // group's own model count is the ceiling.
    if (opt.per_n_models) {
      const raw = Math.floor(size / opt.per_n_models) * (opt.max_per_n || 1);
      return (groupN != null) ? Math.min(raw, groupN) : raw;
    }
    if (opt.max_total != null) return opt.max_total;
    if (opt.max_total_all) {
      const g = (groupN != null) ? groupN : size;   // eligible models in the scoped group
      return opt.up_to != null ? Math.min(opt.up_to, g) : g;
    }
    return 0;
  }
  // ── E14: free, unconditional adds default to selected ─────────────────────
  // A pure add that grants something for free, has no gate, no shared pool and a
  // hard cap of one is a thing no player would decline, so a new entry is seeded
  // with it already ticked. It stays an ordinary toggle the player can clear — the
  // model on the table may not carry the part, and a list has to be buildable to
  // match it. A default is a convenience, never a lock.
  //
  // Deliberately narrow. Excluded and banked:
  //   * priced adds — the cost is exactly the reason not to take it. wargear_points.json
  //     is the authority; the MFM WARGEAR OPTIONS blocks price none of the adds we seed.
  //   * per-N / pooled adds — a stepper has no unambiguous "on", and its ceiling moves
  //     with unit size.
  //   * gated adds (requires_weapon) — the gate can break and heal after the seed.
  // Seeding happens once, when the unit is added from the roster. A saved list is
  // never rewritten on load.
  function loIsFreeDefaultAdd(unitId, o) {
    if (!o || o.type !== 'add') return false;
    if (o.requires_weapon || o.pool_id) return false;
    if (o.per_n_models || o.max_total !== 1) return false;
    const item = o.equipment || o.adds_weapon;
    if (!item) return false;
    const priced = wargearPoints[unitId];
    if (priced && priced.items && priced.items[weaponBase(item)]) return false;
    return true;
  }
  function loadoutDefaultWargear(unitId) {
    const w = {};
    const def = loadoutDefs[unitId];
    if (!def || !Array.isArray(def.options)) return w;
    for (const o of def.options) if (loIsFreeDefaultAdd(unitId, o)) w[o.id] = 1;
    return w;
  }
  // B13 / B58: derive the chosen model count for every optional model group from
  // entry.wargear. Storage key is 'opt_' + group name.
  // B58: a banded optional group ("0-4 Kill Team Intercessors with pyreblasters") stores
  // how many models were taken, clamped here to its own band `max`. The B13 0/1 toggle is
  // the degenerate one-band case (max 1), so both shapes run through one path.
  // The B56g escort shape (optional + per_bracket) stays a 0/1 flag — loGroupCounts turns
  // the flag into the bracket count — so it is clamped to 1 regardless of any max.
  // NOTE: this clamp is per-group only. The unit-wide cap (models left after the base
  // group's minimum is reserved) is size-dependent and is applied in loGroupCounts.
  function loOptCounts(def, entry) {
    const out = {};
    for (const g of (def.model_groups || [])) {
      const ct = g.count || {};
      if (!ct.optional) continue;
      const raw = entry ? Number(entry.wargear['opt_' + g.name]) || 0 : 0;
      const cap = ct.per_bracket ? 1 : (ct.max != null ? ct.max : 1);
      out[g.name] = Math.max(0, Math.min(raw, cap));
    }
    return out;
  }

  // B58: how many models are available to consuming optional groups at this size.
  // Everything non-optional reserves first (fixed counts, per_bracket counts), and the
  // fills_to_size body group reserves its composition minimum ("2-9 Kill Team
  // Intercessors" reserves 2) before any variant band may draw. The escort shape
  // (optional + per_bracket, D174) rides alongside the bracket and is not counted here.
  // Groups with no `min` recorded contribute 0, which is the pre-B58 behaviour.
  function loOptHeadroom(def, size) {
    let reserved = 0;
    for (const g of (def.model_groups || [])) {
      const ct = g.count || {};
      if (ct.non_consuming) continue;  // B59a: rides alongside the bracket, reserves nothing
      if (ct.optional) continue;
      if (ct.fixed != null) reserved += ct.fixed;
      else if (ct.per_bracket) reserved += (ct.per_bracket[String(size)] || 0);
      else if (ct.fills_to_size) reserved += (ct.min != null ? ct.min : 0);
    }
    return Math.max(0, (Number(size) || 0) - reserved);
  }

  // B58: the highest legal value one optional group may hold, given what the other
  // optional groups already hold. Band max first, then whatever headroom is left once
  // the sibling bands have taken their share. Used by the stepper so an illegal mix is
  // simply unreachable (D0) rather than reachable-and-flagged.
  function loOptMax(def, size, optCounts, groupName) {
    const g = (def.model_groups || []).find(x => x.name === groupName);
    if (!g) return 0;
    const ct = g.count || {};
    if (!ct.optional) return 0;
    const band = ct.per_bracket ? 1 : (ct.max != null ? ct.max : 1);
    if (ct.per_bracket) return band;          // escort: does not consume the bracket
    const oc = optCounts || {};
    let used = 0;
    for (const o of def.model_groups) {
      const c = o.count || {};
      if (!c.optional || c.per_bracket || o.name === groupName) continue;
      used += Math.max(0, Number(oc[o.name]) || 0);
    }
    return Math.max(0, Math.min(band, loOptHeadroom(def, size) - used));
  }

  function loGroupCounts(def, size, optCounts) {
    // First pass: resolve every group that isn't fills-to-size, tallying how many
    // models they reserve. fixed = its count; per_bracket = the count for the
    // chosen size; optional = the player-chosen band count (B13/B58 — 0 when no
    // optCounts supplied). Second pass: fills groups take the remainder, which the
    // band clamp guarantees is never below the group's composition minimum.
    const oc = optCounts || {};
    let reserved = 0;
    let headroom = loOptHeadroom(def, size);   // B58 — models the variant bands may draw from
    const c = {};
    for (const g of def.model_groups) {
      const ct = g.count || {};
      if (ct.fixed != null) { c[g.name] = ct.fixed; reserved += ct.fixed; }
      // B56g phase 3: optional + per_bracket is a 0-or-N escort toggle (e.g. Hunting
      // Wolves) — off gives 0, on gives the full bracket count. It does NOT add to
      // `reserved`: the escort rides alongside the size bracket, it isn't part of it
      // (D174 — all four printed configs keep the Headtaker count at exactly the
      // bracket size whether or not the escort is taken), so it must not shrink a
      // fills_to_size group's remainder.
      else if (ct.optional && ct.per_bracket) { c[g.name] = (oc[g.name] || 0) > 0 ? (ct.per_bracket[String(size)] || 0) : 0; }
      else if (ct.per_bracket) { const v = ct.per_bracket[String(size)] || 0; c[g.name] = v; reserved += v; }
      // B58: a banded optional group draws N models from the unit's total, capped by its
      // own band max and by the models left after the fills_to_size group's composition
      // minimum is set aside. Bands are served in model_groups order; a later band is
      // trimmed rather than a shared cap being flagged (D0 — the illegal mix is simply
      // unreachable). The UI clamps on the way up, so the trim here is a backstop for a
      // saved list re-opened at a smaller size.
      else if (ct.optional) {
        const band = ct.max != null ? ct.max : 1;
        if (ct.non_consuming) {
          // B59a: rides alongside the bracket rather than drawing from it — clamp to
          // the band only. It neither takes headroom from sibling bands nor reserves
          // from size (same "alongside, not part of it" rule as the per_bracket
          // escort above, generalised to a plain optional group — D182).
          const v = Math.max(0, Math.min(Number(oc[g.name]) || 0, band));
          c[g.name] = v;
        } else {
          const v = Math.max(0, Math.min(Number(oc[g.name]) || 0, band, headroom));
          headroom -= v;
          c[g.name] = v; reserved += v;
        }
      }
      else c[g.name] = null;   // fills_to_size — resolved below
    }
    for (const g of def.model_groups) if (c[g.name] === null) c[g.name] = Math.max(0, size - reserved);
    return c;
  }
  // ── requires_weapon: carrier counting (B19) ───────────────────────────────
  // A gated option ("one model equipped with a bolt rifle can take X") is legal
  // only while enough models in its scope group still carry the named weapon.
  // Carriers = models holding it as default gear, minus models that swapped it
  // away (choice OR count swaps), plus models that gained it from a swap or add.
  // Matching is on the base weapon name, so "Plasma incinerator" matches the
  // "– standard"/"– supercharge" profiles; compound replacements ("A + B") are
  // split and each part counted.
  function loWeaponParts(name) { return String(name || '').split(' + ').map(weaponBase).filter(Boolean); }
  function loHasWeapon(name, want) { return loWeaponParts(name).includes(weaponBase(want)); }

      const btnLabel = included ? 'Included' : (perBracketN ? `Add ${perBracketN}` : 'Add');

      }

        }

      // Split this scope's options into their option-groups, preserving order,
      // so each group heading can carry a (picked/allowed) counter and a list

      for (const o of opts) { if (!groupMap[o.group]) { groupMap[o.group] = []; groupOrder.push(o.group); } groupMap[o.group].push(o); }
      for (let gi = 0; gi < groupOrder.length; gi++) {
        const gk = groupOrder[gi], gopts = groupMap[gk];
        // Counter + the item list for the ☰ icon, in one pass over the group.

        for (const o of gopts) {

            if (mates.length > 1) {
              if (seenRoot.has(root)) continue; seenRoot.add(root);
              allowed += 1; if (mates.some(m => entry.wargear[m.id])) picked += 1;
              for (const m of mates) for (const c of m.choices) listNames.push(c);
            } else {

            if (poolInfo) mx = Math.min(mx, Math.max(0, poolInfo.pool - poolInfo.leaderUsed));
            allowed += mx;
            const tally = (entry.wargear[o.id] && typeof entry.wargear[o.id] === 'object') ? entry.wargear[o.id] : {};
            picked += Object.keys(tally).reduce((a, k) => a + (Number(tally[k]) || 0), 0);

              if (poolInfo) mx = Math.max(0, poolInfo.pool - poolInfo.leaderUsed);

        for (const o of gopts) {

            if (mates.length > 1) {

              const ids = mates.map(m => m.id).join(',');
              const anyCur = mates.some(m => entry.wargear[m.id]);
              html += loChoiceRowX(entry.listId, ids, '', '', o.replaces, !anyCur, o.replaces ? mkDetail('eye', itemDetailHtml(raw, o.replaces)) : null);
              for (const m of mates)

            const tally = (entry.wargear[o.id] && typeof entry.wargear[o.id] === 'object') ? entry.wargear[o.id] : {};
            html += `<div class="lo-substep-note">pick up to ${max}</div>`;
            for (const c of o.replacement_choices) {

                                `editLoadoutChoiceCount(${entry.listId},'${esc(o.id)}','${esc(c)}',1,${max})`, cur, c, '', mkDetail('eye', itemDetailHtml(raw, c)));
            }
          } else if (o.type === 'count') {
            if (o.requires_weapon && !reqOkUI(o)) {

              html += `<div class="option-item radio disabled"><div class="option-item-row"><div class="option-check"></div>
                <div class="option-item-name">${o.replacement || o.group} — needs ${loReqLabel(o)}</div>${d.btn}</div></div>${d.panel}`;
            } else {
            let max = Math.min(loMaxCount(o, size, grpCounts[g.name]), reqCapUI(o));
            const poolInfoC = o.pool_id ? (roll.pools && roll.pools['pool:' + o.pool_id]) : null;
            if (poolInfoC) max = Math.min(max, Math.max(0, poolInfoC.pool - poolInfoC.leaderUsed));
            const cur = Math.min(Number(entry.wargear[o.id] || 0), max);
            html += loStepper(`editLoadoutCount(${entry.listId},'${esc(o.id)}',-1,${max})`,
                              `editLoadoutCount(${entry.listId},'${esc(o.id)}',1,${max})`, cur, (o.replacement || o.group), `(max ${max})`, mkDetail('eye', itemDetailHtml(raw, o.replacement || o.group)));

            const poolInfo = o.pool_id ? (roll.pools && roll.pools['pool:' + o.pool_id]) : null;
            if (o.max_total === 1 && !o.per_n_models) {
              const disabled = !reqOkUI(o) || (poolInfo && poolInfo.pool === 0);
              const on = Number(entry.wargear[o.id] || 0) > 0;

  function loStepper(minusCall, plusCall, cur, label, sub, detail) {
    const btn = detail ? detail.btn : '', panel = detail ? detail.panel : '';

      <span class="lo-step-val">${cur}</span>
      <button class="lo-step-btn" onclick="${plusCall}">+</button>
      <span class="lo-step-lbl">${label} <span class="lo-step-max">${sub}</span></span>${btn}

  }
  function editLoadoutChoiceCount(listId, optId, choice, delta, groupMax) {
    const e = armyList.find(x => x.listId === listId); if (!e) return;
    let t = (e.wargear[optId] && typeof e.wargear[optId] === 'object') ? e.wargear[optId] : {};
    const sum = Object.keys(t).reduce((a, k) => a + (Number(t[k]) || 0), 0);
    const cur = Number(t[choice] || 0);
    if (delta > 0 && sum >= groupMax) return;      // group cap is a firm rule
    t = Object.assign({}, t); t[choice] = Math.max(0, cur + delta);

  }
  function editLoadoutAdd(listId, optId) {

    renderAll();
  }
  // B13 Piece 2: Epic Hero cap for optional model groups.

  // Returns true if any OTHER entry in armyList already has this group toggled on.
  function isOptEpicHeroBlocked(thisListId, groupName) {
    if (!groupName.toUpperCase().includes('EPIC HERO')) return false;
    const key = 'opt_' + groupName;
    return armyList.some(e => e.listId !== thisListId && Number(e.wargear[key] || 0) > 0);
  }

  // B13: toggle an optional model group (e.g. Chapter Ancient in Victrix Honour Guard) in or out.
  // Storage key is 'opt_' + groupName; value 1 = included, absent/0 = excluded.
  // loGroupCounts reads this so fills_to_size deducts included optionals from the body count.
  // B13 Piece 2: blocked if the same group is already included in another entry (Epic Hero cap).
  // B58: called with no delta it is the original toggle; called with +1/-1 it is the
  // stepper for a banded group. Both clamp to loOptMax, so the base group's minimum and
  // the sibling bands hard-cap what can be taken rather than flagging an overrun.
  function editLoadoutOptional(listId, groupName, delta) {
    const e = armyList.find(x => x.listId === listId); if (!e) return;
    const key = 'opt_' + groupName;
    const cur = Number(e.wargear[key] || 0);
    if (delta == null) {
      // Only enforce the cap when trying to turn ON; turning off is always allowed.
      if (cur > 0) { e.wargear[key] = 0; renderAll(); return; }
      if (isOptEpicHeroBlocked(listId, groupName)) return;
      const d = loadoutFor(e);
      if (d && loOptMax(d, loadoutSize(e, d), loOptCounts(d, e), groupName) < 1) return;
      e.wargear[key] = 1;
      renderAll();
      return;
    }
    const def = loadoutFor(e); if (!def) return;
    const ceiling = loOptMax(def, loadoutSize(e, def), loOptCounts(def, e), groupName);

  function loChoiceRow(listId, optId, value, label, chosen, detail) {

    return `<div class="option-item radio${chosen ? ' chosen' : ''}" onclick="editLoadoutChoice(${listId},'${esc(optId)}','${esc(value)}')">
      <div class="option-item-row"><div class="option-check">${chosen ? '\u25CF' : ''}</div>

    const btn = detail ? detail.btn : '', panel = detail ? detail.panel : '';

      <div class="option-item-row"><div class="option-check">${chosen ? '\u25CF' : ''}</div>

  function editLoadoutChoiceX(listId, ids, optId, value) {

  function editLoadoutCount(listId, optId, delta, max) {
    const e = armyList.find(x => x.listId === listId); if (!e) return;

  // Popup: model make-up + weapon counts for loadout-defined units.
  function loadoutWeaponHtml(entry, def, raw) {
    const size = loadoutSize(entry, def);
    const oc = loOptCounts(def, entry);
    const roll = loRollup(def, size, loadoutSelections(entry, def), oc);
    const counts = loGroupCounts(def, size, oc);
    const makeup = def.model_groups.map(g => `${g.name} \u00d7${counts[g.name]}`).join(', ');
    let html = `<div class="weapon-section"><div class="weapon-section-label">Model make-up</div>
      <div class="lo-makeup">${makeup}</div></div>`;
    if (roll.overAllocated) html += `<div class="over-limit-flag">\u26a0 Too many weapon swaps for this unit size</div>`;
    const cmap = {};
    for (const kv of roll.weapons.entries()) cmap[kv[0].toLowerCase()] = kv[1];
    // Fold in the chosen bundle endpoint's add/remove so bundle-owned units
    // (Captain) show the swapped weapons, not the default loadout.
    const bd = activeBundleWeaponDelta(entry, raw);
    for (const r of bd.removes) delete cmap[weaponBase(r)];
    for (const a of bd.adds) cmap[weaponBase(a)] = (cmap[weaponBase(a)] || 0) + 1;
    html += loWeaponTable('Ranged Weapons', raw.weapons.filter(w => w.weapon_type === 'Ranged'), cmap);
    html += loWeaponTable('Melee Weapons', raw.weapons.filter(w => w.weapon_type === 'Melee'), cmap);
    if (roll.equipment.size) {
      const items = [...roll.equipment.entries()].map(kv => `${kv[0]} \u00d7${kv[1]}`).join(', ');
      html += `<div class="weapon-section"><div class="weapon-section-label">Other wargear</div><div class="lo-makeup">${items}</div></div>`;
    }
    return html;
  }
  function loWeaponTable(label, weapons, cmap) {
    const rows = weapons.map(w => ({ w, n: cmap[weaponBase(w.weapon_name)] || 0 })).filter(x => x.n > 0);
    if (!rows.length) return '';
    let html = `<div class="weapon-section"><div class="weapon-section-label">${label}</div>
      <table class="weapon-table"><thead><tr><th>Weapon</th><th>Range</th><th>A</th><th>BS/WS</th><th>S</th><th>AP</th><th>D</th><th>Abilities</th></tr></thead><tbody>`;
    for (const r of rows) {
      const w = r.w;
      const bsws = w.BS || w.WS || '\u2014';
      const ab = (w.weapon_ability_names && w.weapon_ability_names.length) ? w.weapon_ability_names.join(', ') : '\u2014';
      html += `<tr><td class="weapon-name-cell">${w.weapon_name} <span class="lo-wcount">\u00d7${r.n}</span></td><td>${w.range}</td><td>${w.A}</td><td>${bsws}</td><td>${w.S}</td><td>${w.AP}</td><td>${w.D}</td><td class="weapon-abilities-cell">${ab}</td></tr>`;

  }

  // ── B47: inline detail expanders + info buttons ───────────────────────────
  // A row's eye opens the detail for that one item; a heading's list icon opens

  // NOT re-render the panel — they toggle a sibling expander via toggleDetail,
