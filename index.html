<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>40K Army Builder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      background: #1a0000;
      border-bottom: 2px solid #8b0000;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #cc2200;
      text-transform: uppercase;
    }

    header .faction-badge {
      font-size: 0.8rem;
      color: #888;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .layout {
      display: grid;
      grid-template-columns: 25% 45% 30%;
      gap: 0;
      height: calc(100vh - 65px);
    }

    /* ── Roster panel ── */
    .roster-panel {
      padding: 1rem 0.75rem;
      overflow-y: auto;
      border-right: 1px solid #2a2a2a;
    }

    .panel-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #666;
      margin-bottom: 0.75rem;
      padding: 0 0.25rem;
    }

    .role-group { margin-bottom: 1.25rem; }

    .role-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #8b0000;
      border-bottom: 1px solid #2a2a2a;
      padding-bottom: 0.3rem;
      margin-bottom: 0.5rem;
    }

    .unit-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 3px;
      padding: 0.45rem 0.6rem;
      margin-bottom: 0.3rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .unit-card:hover { border-color: #8b0000; background: #201010; }
    .unit-card.selected { border-color: #cc2200; background: #1e0a0a; }
    .unit-card.at-limit { opacity: 0.45; cursor: default; }
    .unit-card.at-limit:hover { border-color: #2a2a2a; background: #1a1a1a; }

    .unit-info { flex: 1; min-width: 0; }

    .unit-name {
      font-size: 0.82rem;
      font-weight: 600;
      color: #e0e0e0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .unit-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.15rem;
      margin-left: 0.5rem;
      flex-shrink: 0;
    }

    .unit-pts-badge {
      font-size: 0.75rem;
      font-weight: 700;
      color: #cc9900;
      white-space: nowrap;
    }

    .unit-limit-badge {
      font-size: 0.65rem;
      color: #555;
      white-space: nowrap;
    }

    .unit-limit-badge.at-limit { color: #8b0000; }

    /* ── Army list panel ── */
    .list-panel {
      display: flex;
      flex-direction: column;
      background: #111;
      border-right: 1px solid #2a2a2a;
    }

    .list-header {
      padding: 1.5rem 1.5rem 0.75rem;
      border-bottom: 1px solid #2a2a2a;
    }

    .points-total {
      font-size: 2rem;
      font-weight: 700;
      color: #cc9900;
      line-height: 1;
    }

    .points-cap { font-size: 1rem; font-weight: 400; color: #555; }

    .points-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #555;
      margin-top: 0.2rem;
    }

    .over-cap { color: #cc2200; }

    .list-items {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem 1.5rem;
    }

    .empty-state {
      text-align: center;
      color: #444;
      font-size: 0.85rem;
      margin-top: 3rem;
      line-height: 1.6;
    }

    .list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px solid #1e1e1e;
      cursor: pointer;
    }

    .list-item:hover .list-item-name { color: #fff; }

    .list-item-info { flex: 1; min-width: 0; }

    .list-item-name {
      font-size: 0.85rem;
      color: #ccc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.15s;
    }

    .list-item-sub {
      font-size: 0.7rem;
      color: #555;
      margin-top: 0.1rem;
    }

    .list-item-pts {
      font-size: 0.8rem;
      color: #cc9900;
      font-weight: 600;
      margin: 0 0.75rem;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .remove-btn {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0.1rem 0.2rem;
      border-radius: 2px;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .remove-btn:hover { color: #cc2200; }

    .list-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid #2a2a2a;
    }

    .clear-btn {
      width: 100%;
      background: none;
      border: 1px solid #2a2a2a;
      color: #555;
      padding: 0.5rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: border-color 0.15s, color 0.15s;
    }

    .clear-btn:hover { border-color: #8b0000; color: #cc2200; }

    /* ── Detail panel ── */
    .detail-panel {
      display: flex;
      flex-direction: column;
      background: #0d0d0d;
    }

    .detail-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 0.85rem;
      text-align: center;
      padding: 2rem;
      line-height: 1.6;
    }

    .detail-content {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: none;
    }

    .detail-content.visible { display: block; }

    .detail-unit-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: #e0e0e0;
      line-height: 1.2;
      margin-bottom: 0.25rem;
    }

    .detail-unit-type {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #8b0000;
      margin-bottom: 1.25rem;
    }

    .detail-section-label {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #555;
      margin-bottom: 0.5rem;
    }

    /* God selector */
    .god-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.4rem;
      margin-bottom: 1.25rem;
    }

    .god-option {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 0.5rem 0.6rem;
      cursor: pointer;
      font-size: 0.8rem;
      color: #aaa;
      text-align: center;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      user-select: none;
    }

    .god-option:hover { border-color: #555; color: #ddd; background: #1e1e1e; }

    .god-option.chosen-Khorne   { border-color: #cc2200; background: #1a0500; color: #ff6644; }
    .god-option.chosen-Tzeentch { border-color: #0077cc; background: #001a2a; color: #44aaff; }
    .god-option.chosen-Nurgle   { border-color: #447700; background: #0d1a00; color: #88cc44; }
    .god-option.chosen-Slaanesh { border-color: #9933cc; background: #1a0022; color: #cc77ff; }

    /* Size selector */
    .size-options {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1.5rem;
    }

    .size-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 0.6rem 0.75rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }

    .size-option:hover { border-color: #555; background: #1e1e1e; }
    .size-option.chosen { border-color: #cc9900; background: #1a1500; }

    .size-option-label { font-size: 0.85rem; color: #ccc; }
    .size-option-pts   { font-size: 0.85rem; font-weight: 700; color: #cc9900; }

    /* Wargear options */
    .wargear-section {
      margin-bottom: 1.25rem;
    }

    .wargear-option {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 0.55rem 0.75rem;
      margin-bottom: 0.3rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }

    .wargear-option:hover { border-color: #555; background: #1e1e1e; }
    .wargear-option.chosen { border-color: #cc9900; background: #1a1500; }

    .wargear-option-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .wargear-check {
      width: 14px;
      height: 14px;
      border: 1px solid #444;
      border-radius: 2px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      color: #cc9900;
    }

    .wargear-option.chosen .wargear-check {
      border-color: #cc9900;
      background: #2a2000;
    }

    /* Radio style for grouped choices */
    .wargear-option.radio-style .wargear-check {
      border-radius: 50%;
    }

    .wargear-option-name {
      font-size: 0.82rem;
      color: #ccc;
      flex: 1;
    }

    .wargear-option.chosen .wargear-option-name { color: #e8d890; }

    .wargear-option-note {
      font-size: 0.68rem;
      color: #555;
      margin-top: 0.2rem;
      padding-left: 1.4rem;
    }

    .wargear-group-label {
      font-size: 0.68rem;
      color: #666;
      margin-bottom: 0.3rem;
      font-style: italic;
    }

    /* Other options (icons/instruments) */
    .other-options-section {
      margin-bottom: 1.25rem;
    }

    .other-option {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 0.55rem 0.75rem;
      margin-bottom: 0.3rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }

    .other-option:hover { border-color: #555; background: #1e1e1e; }
    .other-option.chosen { border-color: #cc9900; background: #1a1500; }

    .other-option-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .other-check {
      width: 14px;
      height: 14px;
      border: 1px solid #444;
      border-radius: 2px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      color: #cc9900;
    }

    .other-option.chosen .other-check {
      border-color: #cc9900;
      background: #2a2000;
    }

    .other-option-name {
      font-size: 0.82rem;
      color: #ccc;
      flex: 1;
    }

    .other-option.chosen .other-option-name { color: #e8d890; }

    .other-option-note {
      font-size: 0.68rem;
      color: #555;
      margin-top: 0.2rem;
      padding-left: 1.4rem;
    }

    .detail-points-display {
      font-size: 1.8rem;
      font-weight: 700;
      color: #cc9900;
      line-height: 1;
      margin-bottom: 0.2rem;
    }

    .detail-points-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #555;
      margin-bottom: 1.5rem;
    }

    .copy-note {
      font-size: 0.7rem;
      color: #666;
      margin-bottom: 1rem;
    }

    .limit-warning {
      font-size: 0.75rem;
      color: #cc2200;
      margin-bottom: 1rem;
      font-weight: 600;
    }

    .detail-add-btn {
      width: 100%;
      background: #8b0000;
      border: none;
      color: #fff;
      padding: 0.65rem;
      border-radius: 4px;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 0.5rem;
    }

    .detail-add-btn:hover { background: #cc0000; }

    .detail-add-btn:disabled {
      background: #2a2a2a;
      color: #555;
      cursor: not-allowed;
    }

    .error-msg { color: #cc4444; padding: 2rem; text-align: center; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>40K Army Builder</h1>
    <div class="faction-badge" id="faction-badge">Loading...</div>
  </div>
</header>

<div class="layout">
  <div class="roster-panel">
    <div class="panel-title">Available Units</div>
    <div id="roster"></div>
  </div>

  <div class="list-panel">
    <div class="list-header">
      <div class="points-total" id="points-total">0 <span class="points-cap">/ 2000</span></div>
      <div class="points-label">Points Total</div>
    </div>
    <div class="list-items" id="list-items">
      <div class="empty-state">No units added yet.<br>Select a unit from the roster to begin.</div>
    </div>
    <div class="list-footer">
      <button class="clear-btn" onclick="clearList()">Clear List</button>
    </div>
  </div>

  <div class="detail-panel" id="detail-panel">
    <div class="detail-empty" id="detail-empty">Select a unit from<br>the roster to see options.</div>
    <div class="detail-content" id="detail-content"></div>
  </div>
</div>

<script>
  const POINTS_CAP = 2000;
  const GODS = ['Khorne', 'Tzeentch', 'Nurgle', 'Slaanesh'];
  const GOD_UNITS = new Set(['Soul Grinder', 'Daemon Prince of Chaos', 'Daemon Prince of Chaos with Wings']);

  // D29: instance limits by unit type
  function instanceLimit(unitType) {
    if (unitType === 'Epic Hero') return 1;
    if (unitType === 'Battleline' || unitType === 'Dedicated Transport') return 6;
    return 3;
  }

  let armyList    = [];
  let allUnits    = [];
  let rawUnits    = [];   // full unit objects from JSON (for wargear/other_options lookup)
  let selectedUnit = null;
  let detailState  = {};  // keyed by unit_name

  const TYPE_ORDER = [
    'Epic Hero','Character','Battleline','Infantry','Mounted',
    'Beast','Monster','Vehicle','Dedicated Transport','Fortification','Allied'
  ];

  // ── Data load ──────────────────────────────────────────────────────────────

  async function init() {
    try {
      const res = await fetch('units.json');
      if (!res.ok) throw new Error('Failed to load unit data');
      const data = await res.json();
      const army = data[0];
      document.getElementById('faction-badge').textContent = army.army;

      rawUnits = army.units;

      allUnits = army.units.map(unit => {
        const sizes    = unit.points ? unit.points.sizes : [];
        const needsGod = GOD_UNITS.has(unit.unit_name);
        const limit    = unit.instance_limit_override || instanceLimit(unit.unit_type);

        let sizeDesc = '';
        if (sizes.length > 1) {
          sizeDesc = sizes.map(s => s.size).join(' / ') + ' models';
        } else if (sizes.length === 1) {
          sizeDesc = sizes[0].size + (sizes[0].size === 1 ? ' model' : ' models');
        }

        return {
          unit_name: unit.unit_name,
          unit_type: unit.unit_type,
          sizes,
          needsGod,
          limit,
          minPts: sizes.length > 0 ? sizes[0].first_unit : null,
          sizeDesc,
        };
      });

      renderRoster(allUnits);
    } catch (err) {
      document.getElementById('roster').innerHTML =
        `<div class="error-msg">Could not load unit data: ${err.message}</div>`;
      document.getElementById('faction-badge').textContent = 'Error';
    }
  }

  // ── Roster ─────────────────────────────────────────────────────────────────

  function groupByType(units) {
    const groups = {};
    for (const u of units) {
      const t = u.unit_type || 'Other';
      if (!groups[t]) groups[t] = [];
      groups[t].push(u);
    }
    const ordered = TYPE_ORDER.filter(t => groups[t]);
    const extra   = Object.keys(groups).filter(t => !TYPE_ORDER.includes(t)).sort();
    return [...ordered, ...extra].map(t => ({ type: t, units: groups[t] }));
  }

  function renderRoster(units) {
    const roster = document.getElementById('roster');
    const groups = groupByType(units);
    roster.innerHTML = groups.map(({ type, units }) => `
      <div class="role-group">
        <div class="role-label">${type}</div>
        ${units.map(u => {
          const count   = armyList.filter(e => e.unit_name === u.unit_name).length;
          const atLimit = count >= u.limit;
          return `
            <div class="unit-card${selectedUnit === u.unit_name ? ' selected' : ''}${atLimit ? ' at-limit' : ''}"
                 id="card-${cssId(u.unit_name)}"
                 onclick="${atLimit ? '' : `openDetail('${esc(u.unit_name)}')`}">
              <div class="unit-info">
                <div class="unit-name">${u.unit_name}</div>
              </div>
              <div class="unit-right">
                <div class="unit-pts-badge">${u.minPts !== null ? u.minPts + ' pts' : '—'}</div>
                <div class="unit-limit-badge${atLimit ? ' at-limit' : ''}">(${count}/${u.limit})</div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `).join('');
  }

  // ── Detail panel ───────────────────────────────────────────────────────────

  function openDetail(unitName) {
    selectedUnit = unitName;

    document.querySelectorAll('.unit-card').forEach(el => el.classList.remove('selected'));
    const card = document.getElementById('card-' + cssId(unitName));
    if (card) card.classList.add('selected');

    const unit = allUnits.find(u => u.unit_name === unitName);
    if (!unit) return;

    if (!detailState[unitName]) {
      detailState[unitName] = {
        chosenSizeIdx: 0,
        chosenGod: null,
        wargear: {},      // option_group+weapon_replaced -> replacement_weapon_name or null
        otherOptions: {}, // option_name -> bool
      };
    }

    document.getElementById('detail-empty').style.display = 'none';
    document.getElementById('detail-content').classList.add('visible');

    renderDetail(unit);
  }

  function renderDetail(unit) {
    const state     = detailState[unit.unit_name];
    const sizes     = unit.sizes;
    const copyCount = armyList.filter(e => e.unit_name === unit.unit_name).length;
    const atLimit   = copyCount >= unit.limit;
    const raw       = rawUnits.find(u => u.unit_name === unit.unit_name);

    function ptsForSize(sizeEntry) {
      if (copyCount === 0) return sizeEntry.first_unit;
      if (copyCount === 1) return sizeEntry.second_unit;
      return sizeEntry.third_plus;
    }

    const chosen    = sizes[state.chosenSizeIdx];
    const chosenPts = chosen ? ptsForSize(chosen) : null;
    const godReady  = !unit.needsGod || state.chosenGod !== null;
    const canAdd    = chosenPts !== null && godReady && !atLimit;

    // Copy note
    const copyNote = copyCount > 0 && !atLimit
      ? `<div class="copy-note">${copyCount} cop${copyCount === 1 ? 'y' : 'ies'} in list — ${copyCount === 1 ? '2nd' : '3rd+'} unit pricing applied</div>`
      : '';

    // Limit warning
    const limitWarning = atLimit
      ? `<div class="limit-warning">Limit reached (${unit.limit} maximum)</div>`
      : '';

    // God selector
    const godSelector = unit.needsGod ? `
      <div class="detail-section-label">Daemonic Allegiance</div>
      <div class="god-options">
        ${GODS.map(g => `
          <div class="god-option${state.chosenGod === g ? ' chosen-' + g : ''}"
               onclick="chooseGod('${esc(unit.unit_name)}', '${g}')">
            ${g}
          </div>
        `).join('')}
      </div>
    ` : '';

    // Size selector
    const sizeSelector = sizes.length > 1 ? `
      <div class="detail-section-label">Unit Size</div>
      <div class="size-options">
        ${sizes.map((s, idx) => `
          <div class="size-option${idx === state.chosenSizeIdx ? ' chosen' : ''}"
               onclick="chooseSizeIdx('${esc(unit.unit_name)}', ${idx})">
            <span class="size-option-label">${s.size} model${s.size === 1 ? '' : 's'}</span>
            <span class="size-option-pts">${ptsForSize(s) !== null ? ptsForSize(s) + ' pts' : '—'}</span>
          </div>
        `).join('')}
      </div>
    ` : `
      <div class="detail-section-label">Unit Size</div>
      <div style="font-size:0.85rem;color:#888;margin-bottom:1.25rem;">
        ${sizes[0] ? sizes[0].size + ' model' + (sizes[0].size === 1 ? '' : 's') + ' (fixed)' : '—'}
      </div>
    `;

    // Wargear options
    const wargearHtml = buildWargearHtml(unit, raw, state);

    // Other options (icons, instruments, etc.)
    const otherHtml = buildOtherOptionsHtml(unit, raw, state);

    document.getElementById('detail-content').innerHTML = `
      <div class="detail-unit-name">${unit.unit_name}</div>
      <div class="detail-unit-type">${unit.unit_type}</div>
      ${godSelector}
      ${limitWarning}
      ${copyNote}
      ${sizeSelector}
      ${wargearHtml}
      ${otherHtml}
      <div class="detail-points-display">${chosenPts !== null ? chosenPts : '—'}</div>
      <div class="detail-points-label">Points</div>
      <button class="detail-add-btn"
              onclick="addUnit('${esc(unit.unit_name)}')"
              ${!canAdd ? 'disabled' : ''}>
        ${atLimit ? 'Limit Reached' : unit.needsGod && !state.chosenGod ? 'Choose Allegiance to Add' : 'Add to Army'}
      </button>
    `;
  }

  // Build wargear substitution HTML
  function buildWargearHtml(unit, raw, state) {
    if (!raw || !raw.wargear_options || raw.wargear_options.length === 0) return '';

    const options = raw.wargear_options;

    // Separate grouped choices (is_choice=true, has option_group) from independent swaps
    const groups = {};
    const independent = [];

    for (const opt of options) {
      if (opt.is_choice && opt.option_group) {
        const key = opt.option_group;
        if (!groups[key]) groups[key] = [];
        groups[key].push(opt);
      } else {
        independent.push(opt);
      }
    }

    let html = '';

    // Grouped choices — render as radio-style (pick one or none)
    for (const [groupKey, opts] of Object.entries(groups)) {
      // Label: "Replace [weapon_replaced] with:"
      const replaced = opts[0].weapon_replaced;
      const stateKey = `group_${groupKey}`;
      const chosen   = state.wargear[stateKey] || null;

      html += `<div class="wargear-section">`;
      html += `<div class="detail-section-label">Replace ${replaced}</div>`;
      for (const opt of opts) {
        const isCh = chosen === opt.replacement_weapon_name;
        html += `
          <div class="wargear-option radio-style${isCh ? ' chosen' : ''}"
               onclick="toggleWargearGroup('${esc(unit.unit_name)}','${esc(stateKey)}','${esc(opt.replacement_weapon_name)}')">
            <div class="wargear-option-row">
              <div class="wargear-check">${isCh ? '●' : ''}</div>
              <div class="wargear-option-name">${opt.replacement_weapon_name}</div>
            </div>
          </div>
        `;
      }
      html += `</div>`;
    }

    // Independent swaps — render as checkboxes
    // Group by weapon_replaced in case multiple rows share the same replaced weapon (e.g. Great Unclean One bilesword strike+sweep)
    const indepByWeapon = {};
    for (const opt of independent) {
      const k = opt.weapon_replaced;
      if (!indepByWeapon[k]) indepByWeapon[k] = [];
      indepByWeapon[k].push(opt);
    }

    for (const [replaced, opts] of Object.entries(indepByWeapon)) {
      // All rows for the same replaced weapon represent the same logical swap — just show it once
      const opt      = opts[0];
      const stateKey = `indep_${replaced}`;
      const isCh     = !!state.wargear[stateKey];
      html += `
        <div class="wargear-section">
          <div class="detail-section-label">Optional Swap</div>
          <div class="wargear-option${isCh ? ' chosen' : ''}"
               onclick="toggleWargearIndep('${esc(unit.unit_name)}','${esc(stateKey)}')">
            <div class="wargear-option-row">
              <div class="wargear-check">${isCh ? '✓' : ''}</div>
              <div class="wargear-option-name">${replaced} → ${opt.replacement_weapon_name}</div>
            </div>
          </div>
        </div>
      `;
    }

    if (html) {
      return `<div class="detail-section-label" style="margin-bottom:0.75rem;color:#666;font-size:0.6rem;text-transform:uppercase;letter-spacing:0.1em;">Wargear Options</div>` + html;
    }
    return '';
  }

  // Build other options HTML (icons, instruments, etc.)
  function buildOtherOptionsHtml(unit, raw, state) {
    if (!raw || !raw.other_options || raw.other_options.length === 0) return '';

    let html = `<div class="detail-section-label" style="margin-bottom:0.5rem;">Unit Options</div>`;
    html += `<div class="other-options-section">`;

    for (const opt of raw.other_options) {
      const isCh = !!state.otherOptions[opt.option_name];
      html += `
        <div class="other-option${isCh ? ' chosen' : ''}"
             onclick="toggleOtherOption('${esc(unit.unit_name)}','${esc(opt.option_name)}')">
          <div class="other-option-row">
            <div class="other-check">${isCh ? '✓' : ''}</div>
            <div class="other-option-name">${opt.option_name}</div>
          </div>
          ${opt.carrier_notes ? `<div class="other-option-note">${opt.carrier_notes}</div>` : ''}
        </div>
      `;
    }

    html += `</div>`;
    return html;
  }

  // ── Interaction handlers ────────────────────────────────────────────────────

  function chooseGod(unitName, god) {
    if (!detailState[unitName]) detailState[unitName] = { chosenSizeIdx: 0, chosenGod: null, wargear: {}, otherOptions: {} };
    detailState[unitName].chosenGod = god;
    const unit = allUnits.find(u => u.unit_name === unitName);
    if (unit) renderDetail(unit);
  }

  function chooseSizeIdx(unitName, idx) {
    if (!detailState[unitName]) detailState[unitName] = { chosenSizeIdx: 0, chosenGod: null, wargear: {}, otherOptions: {} };
    detailState[unitName].chosenSizeIdx = idx;
    const unit = allUnits.find(u => u.unit_name === unitName);
    if (unit) renderDetail(unit);
  }

  // Grouped radio-style: clicking the chosen option deselects it (toggle off); clicking another selects it
  function toggleWargearGroup(unitName, stateKey, chosenWeapon) {
    const state = detailState[unitName];
    if (!state) return;
    state.wargear[stateKey] = state.wargear[stateKey] === chosenWeapon ? null : chosenWeapon;
    const unit = allUnits.find(u => u.unit_name === unitName);
    if (unit) renderDetail(unit);
  }

  // Independent swap: simple toggle
  function toggleWargearIndep(unitName, stateKey) {
    const state = detailState[unitName];
    if (!state) return;
    state.wargear[stateKey] = !state.wargear[stateKey];
    const unit = allUnits.find(u => u.unit_name === unitName);
    if (unit) renderDetail(unit);
  }

  // Other options: independent toggles (icon and instrument are independent — one model each)
  function toggleOtherOption(unitName, optionName) {
    const state = detailState[unitName];
    if (!state) return;
    state.otherOptions[optionName] = !state.otherOptions[optionName];
    const unit = allUnits.find(u => u.unit_name === unitName);
    if (unit) renderDetail(unit);
  }

  // ── Army list ──────────────────────────────────────────────────────────────

  function addUnit(unitName) {
    const unit  = allUnits.find(u => u.unit_name === unitName);
    if (!unit) return;
    const state = detailState[unitName];
    if (!state) return;
    if (unit.needsGod && !state.chosenGod) return;

    const copyCount = armyList.filter(e => e.unit_name === unitName).length;
    if (copyCount >= unit.limit) return;

    const sizeEntry = unit.sizes[state.chosenSizeIdx];

    let pts;
    if      (copyCount === 0) pts = sizeEntry.first_unit;
    else if (copyCount === 1) pts = sizeEntry.second_unit;
    else                      pts = sizeEntry.third_plus;

    armyList.push({
      listId:       Date.now() + Math.random(),
      unit_name:    unitName,
      unit_type:    unit.unit_type,
      size:         sizeEntry.size,
      god:          state.chosenGod,
      points:       pts,
      wargear:      { ...state.wargear },
      otherOptions: { ...state.otherOptions },
    });

    renderList();
    renderRoster(allUnits);
    renderDetail(unit);
  }

  function removeUnit(listId) {
    armyList = armyList.filter(u => u.listId !== listId);
    renderList();
    renderRoster(allUnits);
    if (selectedUnit) {
      const unit = allUnits.find(u => u.unit_name === selectedUnit);
      if (unit) renderDetail(unit);
    }
  }

  function clearList() {
    armyList = [];
    renderList();
    renderRoster(allUnits);
    if (selectedUnit) {
      const unit = allUnits.find(u => u.unit_name === selectedUnit);
      if (unit) renderDetail(unit);
    }
  }

  function renderList() {
    const total   = armyList.reduce((sum, u) => sum + (u.points || 0), 0);
    const overCap = total > POINTS_CAP;
    document.getElementById('points-total').innerHTML =
      `<span class="${overCap ? 'over-cap' : ''}">${total.toLocaleString()}</span> <span class="points-cap">/ ${POINTS_CAP.toLocaleString()}</span>`;

    const container = document.getElementById('list-items');
    if (armyList.length === 0) {
      container.innerHTML = '<div class="empty-state">No units added yet.<br>Select a unit from the roster to begin.</div>';
      return;
    }

    container.innerHTML = armyList.map(u => {
      const sub = [u.unit_type, u.god, `${u.size} model${u.size === 1 ? '' : 's'}`]
        .filter(Boolean).join(' · ');
      return `
        <div class="list-item" onclick="openDetail('${esc(u.unit_name)}')">
          <div class="list-item-info">
            <div class="list-item-name">${u.unit_name}</div>
            <div class="list-item-sub">${sub}</div>
          </div>
          <span class="list-item-pts">${u.points !== null ? u.points + ' pts' : '—'}</span>
          <button class="remove-btn" onclick="event.stopPropagation();removeUnit(${u.listId})" title="Remove">&times;</button>
        </div>
      `;
    }).join('');
  }

  // ── Utility ────────────────────────────────────────────────────────────────

  function esc(str)   { return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }
  function cssId(str) { return str.replace(/[^a-zA-Z0-9]/g, '_'); }

  init();
</script>

</body>
</html>
